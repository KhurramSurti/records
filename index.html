<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gold Hayat Cricket Team — Stats Hub</title>
<meta name="description" content="Official batting, bowling, fielding and captaincy records for the Gold Hayat Cricket Team." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090d0b;--bg-2:#0c110e;--surface:#111a15;--surface-2:#16211b;
  --line:rgba(232,184,75,.14);--line-soft:rgba(255,255,255,.06);
  --gold:#e8b84b;--gold-2:#c8952e;--gold-soft:rgba(232,184,75,.10);
  --ball:#c8362b;--pitch:#3fa66a;--sky:#4a90d9;
  --cream:#efe9da;--text:#dfe4de;--muted:#8b968e;--muted-2:#6a746c;
  --radius:14px;--radius-sm:10px;--shadow:0 18px 50px -20px rgba(0,0,0,.7);
  --mono:"Oswald",system-ui,sans-serif;--body:"Inter",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:radial-gradient(1200px 600px at 80% -10%,rgba(232,184,75,.07),transparent 60%),radial-gradient(900px 500px at -10% 10%,rgba(63,166,106,.05),transparent 55%),var(--bg);color:var(--text);font-family:var(--body);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
.tnum{font-variant-numeric:tabular-nums}
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:linear-gradient(180deg,var(--bg-2),var(--bg));border-right:1px solid var(--line-soft);padding:22px 16px;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:12px;padding:6px 8px 18px}
.crest{width:44px;height:44px;border-radius:12px;flex:none;background:linear-gradient(145deg,var(--gold),var(--gold-2));display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:20px;color:#1a1206;box-shadow:0 8px 20px -6px rgba(232,184,75,.5);letter-spacing:.5px}
.brand h1{font-family:var(--mono);font-weight:600;font-size:16px;margin:0;letter-spacing:.4px;color:var(--cream);line-height:1.1}
.brand span{font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.nav-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2);padding:14px 10px 6px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;color:var(--muted);font-size:14px;font-weight:500;transition:.15s}
.nav a .ic{width:18px;height:18px;flex:none;opacity:.8}
.nav a:hover{color:var(--cream);background:rgba(255,255,255,.03)}
.nav a.active{color:#1a1206;background:linear-gradient(135deg,var(--gold),var(--gold-2));font-weight:600}
.nav a.active .ic{opacity:1}
.sidebar-foot{margin-top:auto;padding:14px 10px 4px;font-size:11px;color:var(--muted-2);line-height:1.5}
.main{padding:34px 40px 80px;max-width:1240px;width:100%}
.topbar{display:none}
.dirty{background:linear-gradient(90deg,rgba(232,184,75,.16),rgba(232,184,75,.06));border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.dirty .txt{font-size:13px;color:var(--cream)}
.dirty .txt b{color:var(--gold)}
.scoreboard{background:linear-gradient(180deg,rgba(232,184,75,.05),transparent 40%),var(--surface);border:1px solid var(--line);border-radius:18px;padding:26px 28px;margin-bottom:26px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.scoreboard::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(90deg,rgba(255,255,255,.015) 0 1px,transparent 1px 3px);opacity:.5}
.sb-top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;position:relative}
.sb-eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600}
.sb-title{font-family:var(--mono);font-weight:600;font-size:34px;color:var(--cream);margin:6px 0 0;letter-spacing:.5px;line-height:1}
.sb-sub{color:var(--muted);font-size:13px;margin-top:6px}
.sb-stats{display:flex;gap:30px;flex-wrap:wrap}
.sb-stat{text-align:right}
.sb-stat .n{font-family:var(--mono);font-size:30px;font-weight:600;color:var(--cream);line-height:1}
.sb-stat .l{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:5px}
.sb-stat.win .n{color:var(--pitch)}
.sb-stat.loss .n{color:var(--ball)}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.page-head h2{font-family:var(--mono);font-weight:600;font-size:26px;color:var(--cream);margin:0;letter-spacing:.4px}
.page-head p{color:var(--muted);font-size:13px;margin:4px 0 0}
.eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:8px}
.grid{display:grid;gap:16px}
.grid.c4{grid-template-columns:repeat(4,1fr)}
.grid.c3{grid-template-columns:repeat(3,1fr)}
.grid.c2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);padding:18px 20px}
.card.gold{border-color:var(--line)}
.stat-card{display:flex;flex-direction:column;gap:2px}
.stat-card .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.stat-card .v{font-family:var(--mono);font-size:30px;font-weight:600;color:var(--cream);line-height:1.15}
.stat-card .v small{font-size:14px;color:var(--muted);font-weight:400}
.stat-card .sub{font-size:12px;color:var(--muted-2)}
.table-wrap{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{text-align:right;padding:13px 12px;font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line-soft);white-space:nowrap;background:var(--bg-2);position:sticky;top:0}
thead th.sortable{cursor:pointer;user-select:none;transition:color .15s}
thead th.sortable:hover{color:var(--gold)}
thead th .arr{color:var(--gold);margin-left:3px}
th.l,td.l{text-align:left}
tbody td{padding:12px;border-bottom:1px solid rgba(255,255,255,.03);text-align:right;white-space:nowrap;color:var(--text)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(232,184,75,.03)}
tbody tr.clickable{cursor:pointer}
.rank{color:var(--muted-2);font-family:var(--mono);width:34px}
.rank.top{color:var(--gold)}
.pname{font-weight:600;color:var(--cream)}
.pname:hover{color:var(--gold)}
.hi{color:var(--gold);font-weight:600}
.dim{color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em}
.badge.win{background:rgba(63,166,106,.14);color:var(--pitch)}
.badge.loss{background:rgba(200,54,43,.14);color:#e37a70}
.badge.tie{background:rgba(232,184,75,.14);color:var(--gold)}
.badge.nr{background:rgba(255,255,255,.06);color:var(--muted)}
.chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:var(--gold-soft);color:var(--gold);font-weight:600}
.chip.red{background:rgba(200,54,43,.13);color:#e37a70}
.chip.cap{background:rgba(74,144,217,.15);color:#8fbce8}
.star{color:var(--gold)}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
input,select{background:var(--bg-2);border:1px solid var(--line-soft);color:var(--text);padding:9px 11px;border-radius:9px;font-size:13.5px;outline:none;transition:.15s}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,184,75,.12)}
select{cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:10px;border:1px solid var(--line);background:transparent;color:var(--cream);font-weight:600;font-size:13.5px;transition:.15s}
.btn:hover{background:var(--gold-soft);border-color:var(--gold)}
.btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#1a1206;border:none}
.btn.primary:hover{filter:brightness(1.06)}
.btn.ghost{border-color:var(--line-soft);color:var(--muted)}
.btn.ghost:hover{color:var(--cream);border-color:var(--line)}
.btn.danger{border-color:rgba(200,54,43,.3);color:#e37a70}
.btn.danger:hover{background:rgba(200,54,43,.1)}
.btn.sm{padding:6px 11px;font-size:12px}
.match-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:16px;align-items:center;padding:15px 20px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:.15s}
.match-row:last-child{border-bottom:none}
.match-row:hover{background:rgba(232,184,75,.03)}
.match-date{font-family:var(--mono);font-size:13px;color:var(--muted);width:88px}
.match-vs .opp{font-weight:600;color:var(--cream);font-size:15px}
.match-vs .meta{font-size:12px;color:var(--muted-2);margin-top:2px}
.match-score{font-family:var(--mono);font-size:17px;color:var(--cream);text-align:right}
.match-score .opp-score{color:var(--muted);font-size:13px}
.sc-section-title{font-family:var(--mono);font-size:15px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin:26px 0 12px;display:flex;align-items:center;gap:10px}
.sc-section-title::after{content:"";flex:1;height:1px;background:var(--line-soft)}
.dismissal{color:var(--muted);font-size:12.5px}
.profile-head{display:flex;align-items:center;gap:18px;margin-bottom:8px}
.avatar{width:66px;height:66px;border-radius:16px;flex:none;background:linear-gradient(145deg,var(--surface-2),var(--surface));border:1px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:26px;font-weight:600;color:var(--gold)}
.profile-head h2{font-family:var(--mono);font-size:30px;color:var(--cream);margin:0;letter-spacing:.4px}
.profile-head .role{color:var(--muted);font-size:13px}
.spark{display:block;width:100%;height:120px}
.bar{fill:var(--gold-2);transition:.2s}
.bar:hover{fill:var(--gold)}
.chart-card{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);padding:18px 20px}
.donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.legend{display:flex;flex-direction:column;gap:9px;font-size:13px;min-width:150px}
.legend .li{display:flex;align-items:center;gap:9px;color:var(--text)}
.legend .dot{width:11px;height:11px;border-radius:3px;flex:none}
.legend .val{margin-left:auto;font-family:var(--mono);color:var(--cream)}
.barsH{display:flex;flex-direction:column;gap:11px}
.barH{display:grid;grid-template-columns:130px 1fr 92px;align-items:center;gap:12px;font-size:13px}
.barH .lab{color:var(--cream);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.barH .lab:hover{color:var(--gold)}
.barH .track{height:14px;background:var(--bg-2);border-radius:8px;overflow:hidden;border:1px solid var(--line-soft)}
.barH .fill{height:100%;background:linear-gradient(90deg,var(--gold-2),var(--gold));border-radius:8px;transition:width .4s}
.barH .v{font-family:var(--mono);color:var(--cream);text-align:right;font-size:12.5px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .em-ic{font-size:34px;margin-bottom:10px;opacity:.5}
.notice{background:var(--gold-soft);border:1px solid var(--line);border-radius:12px;padding:14px 18px;font-size:13px;color:var(--cream);margin-bottom:18px}
.notice b{color:var(--gold)}
.form-section{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);padding:22px;margin-bottom:18px}
.form-section h3{font-family:var(--mono);font-size:15px;letter-spacing:.05em;text-transform:uppercase;color:var(--cream);margin:0 0 16px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.entry-table{width:100%;border-collapse:collapse;font-size:13px}
.entry-table th{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:6px;text-align:center;font-family:var(--mono);font-weight:500}
.entry-table th.l{text-align:left}
.entry-table td{padding:4px}
.entry-table input,.entry-table select{width:100%;padding:7px 8px;text-align:center;font-size:13px}
.entry-table input.name,.entry-table select{text-align:left}
.entry-table .num{width:58px}
.calc{font-family:var(--mono);color:var(--gold);font-size:13px;text-align:center;white-space:nowrap}
.row-del{background:none;border:none;color:var(--muted-2);font-size:16px;padding:2px 6px}
.row-del:hover{color:var(--ball)}
.total-line{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line-soft);font-family:var(--mono);color:var(--cream);font-size:14px}
.total-line .diff{color:var(--gold)}
textarea{width:100%;min-height:220px;background:var(--bg-2);border:1px solid var(--line-soft);color:var(--text);border-radius:10px;padding:14px;font-family:ui-monospace,monospace;font-size:12.5px;resize:vertical}
.hr{height:1px;background:var(--line-soft);margin:22px 0}
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:40;padding:14px 18px;background:rgba(9,13,11,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line-soft)}
  .topbar .brand{padding:0}
  .topbar .crest{width:36px;height:36px;font-size:16px}
  .topbar h1{font-size:14px}
  .menu-btn{background:none;border:1px solid var(--line-soft);border-radius:9px;color:var(--cream);padding:8px 10px;font-size:18px;line-height:1}
  .drawer{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);display:none}
  .drawer.open{display:block}
  .drawer .panel{position:absolute;top:0;left:0;bottom:0;width:250px;background:var(--bg-2);border-right:1px solid var(--line);padding:20px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
  .main{padding:20px 16px 70px}
  .sb-title{font-size:26px}
  .sb-stat .n{font-size:24px}
  .grid.c4{grid-template-columns:repeat(2,1fr)}
  .grid.c3{grid-template-columns:1fr}
  .grid.c2{grid-template-columns:1fr}
  .match-row{grid-template-columns:1fr auto;row-gap:6px}
  .match-date{width:auto;grid-column:1/-1}
  .barH{grid-template-columns:96px 1fr 78px}
}
@media(min-width:901px){.drawer{display:none!important}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="crest">GH</div><div><h1>Gold Hayat</h1><span>Cricket Club</span></div></div>
    <nav class="nav" id="nav-desktop"></nav>
    <div class="sidebar-foot">Manual scorecard hub — our batting, bowling, fielding &amp; captaincy only.<br><span id="foot-count"></span></div>
  </aside>
  <div class="topbar">
    <div class="brand"><div class="crest">GH</div><h1 style="font-family:var(--mono);color:var(--cream)">Gold Hayat</h1></div>
    <button class="menu-btn" id="menuBtn">☰</button>
  </div>
  <div class="drawer" id="drawer"><div class="panel">
    <div class="brand" style="padding:6px 8px 16px"><div class="crest">GH</div><div><h1 style="font-family:var(--mono);color:var(--cream)">Gold Hayat</h1><span style="font-size:11px;color:var(--muted)">Cricket Club</span></div></div>
    <nav class="nav" id="nav-mobile"></nav>
  </div></div>
  <main class="main" id="view"></main>
</div>
<script>
/* ============================================================
   GOLD HAYAT CRICKET TEAM — STATS HUB
   Single-file app. The permanent record is data.json committed
   to your GitHub repo. This browser keeps a working copy so you
   never lose an entry mid-session. See "Data & publish".
   ============================================================ */

const TEAM_NAME = "Gold Hayat Cricket Team";
const FORMATS = ["T20","OD","Test Match","T10"];
const DEFAULT_SQUAD = [
  "Mehboob Yasin","Fayyaz Muhammad","Sami Khan","Sher Muhammad","Syed Zaheer",
  "Mudassir Hamdani","Syed Mudassir","Umer Sohail","Umair Suzuki","Yousuf Nini",
  "Rameez Altaf","Khurram Surti","Abdul Raziq"
].map(n=>({name:n,sub:false}));

// Fresh starting point: your real squad, no matches yet. Add matches from "Add match".
const SAMPLE_DATA = {
  team:{ name:TEAM_NAME, players:DEFAULT_SQUAD },
  matches:[]
};

/* ---------- State + persistence ---------- */
let DATA = null;
const LS_KEY = "goldhayat_data_v2";
const LS_DIRTY = "goldhayat_dirty";

function normalize(d){
  if(!d||typeof d!=="object") d={};
  if(!d.team||typeof d.team!=="object") d.team={name:TEAM_NAME};
  if(!d.team.name) d.team.name=TEAM_NAME;
  if(!Array.isArray(d.team.players)) d.team.players=[];
  if(!Array.isArray(d.matches)) d.matches=[];
  return d;
}
async function loadData(){
  const local = localStorage.getItem(LS_KEY);
  if(local){ try{ const j=JSON.parse(local); if(j&&j.matches) return normalize(j); }catch(e){} }
  try{ const res=await fetch("data.json",{cache:"no-store"}); if(res.ok){ const j=await res.json(); if(j&&j.matches) return normalize(j); } }catch(e){}
  return normalize(JSON.parse(JSON.stringify(SAMPLE_DATA)));
}
function saveLocal(){ localStorage.setItem(LS_KEY, JSON.stringify(DATA)); }
function setDirty(v){ if(v) localStorage.setItem(LS_DIRTY,"1"); else localStorage.removeItem(LS_DIRTY); updateBanner(); }
function isDirty(){ return localStorage.getItem(LS_DIRTY)==="1"; }

/* ---------- Helpers ---------- */
const $ = (s,el=document)=>el.querySelector(s);
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const int = v => { const n=parseInt(v,10); return isNaN(n)?0:n; };
function oversToBalls(o){ const s=String(o||"0").trim(); const p=s.split("."); const ov=int(p[0]); const b=p[1]?int(p[1].charAt(0)):0; return ov*6+Math.min(b,5); }
function ballsToOvers(b){ b=Math.round(b); return Math.floor(b/6)+"."+(b%6); }
function fmtDate(d){ if(!d) return ""; const dt=new Date(d+"T00:00"); if(isNaN(dt)) return d; return dt.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}); }
function initials(name){ return String(name||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
function inn(b){
  const dots=int(b.dots),o=int(b.ones),t=int(b.twos),th=int(b.threes),f=int(b.fours),s=int(b.sixes),fv=int(b.fives||0);
  const runs=o+2*t+3*th+4*f+6*s+5*fv; const balls=dots+o+t+th+f+s+fv;
  return {...b,runs,balls,dots,ones:o,twos:t,threes:th,fours:f,sixes:s,fives:fv,out:b.dismissal!=="notout"};
}
const DISMISSALS=["caught","bowled","lbw","runout","stumped","hitwicket","notout","retired"];
function dismissalText(b){
  const d=b.dismissal;
  if(d==="notout")return "not out";
  if(d==="runout")return "run out"+(b.fielder?" ("+esc(b.fielder)+")":"");
  if(d==="caught")return "c "+(b.fielder?esc(b.fielder):"—")+(b.bowler?" b "+esc(b.bowler):"");
  if(d==="bowled")return "b "+(b.bowler?esc(b.bowler):"—");
  if(d==="lbw")return "lbw"+(b.bowler?" b "+esc(b.bowler):"");
  if(d==="stumped")return "st "+(b.fielder?esc(b.fielder):"—")+(b.bowler?" b "+esc(b.bowler):"");
  if(d==="hitwicket")return "hit wicket";
  if(d==="retired")return "retired";
  return esc(d||"");
}

/* ---------- Filtering (opponent + period + captain) ---------- */
function inPeriod(date,period){
  if(!period||period==="all")return true;
  if(!date)return false;
  const now=new Date();
  if(period==="month")return (new Date(date+"T00:00")).getFullYear()===now.getFullYear() && (new Date(date+"T00:00")).getMonth()===now.getMonth();
  if(period==="year")return date.slice(0,4)===String(now.getFullYear());
  if(/^\d{4}-\d{2}$/.test(period))return date.slice(0,7)===period;
  if(/^\d{4}$/.test(period))return date.slice(0,4)===period;
  return true;
}
function getMatches(opts={}){
  const {opp="all",period="all",captain=null}=opts;
  return DATA.matches.filter(m=>{
    if(opp&&opp!=="all"&&m.opponent!==opp)return false;
    if(captain&&(m.captain||"—")!==captain)return false;
    if(!inPeriod(m.date,period))return false;
    return true;
  });
}
function opponents(){ return [...new Set(DATA.matches.map(m=>m.opponent).filter(Boolean))].sort(); }
function captains(){ return [...new Set(DATA.matches.map(m=>m.captain).filter(Boolean))].sort(); }
function monthsPresent(){ return [...new Set(DATA.matches.map(m=>(m.date||"").slice(0,7)).filter(Boolean))].sort().reverse(); }

/* ---------- Aggregations ---------- */
function battingAgg(ms){
  ms=ms||DATA.matches; const map={};
  ms.forEach(m=>(m.batting||[]).forEach(raw=>{
    const b=inn(raw),k=b.name; if(!k)return;
    const p=map[k]||(map[k]={name:k,inns:0,no:0,runs:0,balls:0,fours:0,sixes:0,dots:0,ones:0,twos:0,threes:0,hs:0,hsNo:false,fifties:0,hundreds:0,ducks:0});
    p.inns++;p.runs+=b.runs;p.balls+=b.balls;p.fours+=b.fours;p.sixes+=b.sixes;p.dots+=b.dots;p.ones+=b.ones;p.twos+=b.twos;p.threes+=b.threes;
    if(!b.out)p.no++;
    if(b.runs>p.hs){p.hs=b.runs;p.hsNo=!b.out;}
    if(b.runs>=100)p.hundreds++;else if(b.runs>=50)p.fifties++;
    if(b.runs===0&&b.out)p.ducks++;
  }));
  return Object.values(map).map(p=>{
    const outs=p.inns-p.no;
    p.avg=outs>0?p.runs/outs:null;
    p.sr=p.balls>0?p.runs/p.balls*100:0;
    p.dotPct=p.balls>0?p.dots/p.balls*100:0;
    return p;
  });
}
function bowlingAgg(ms){
  ms=ms||DATA.matches; const map={};
  ms.forEach(m=>(m.bowling||[]).forEach(raw=>{
    const k=raw.name; if(!k)return; const balls=oversToBalls(raw.overs);
    const p=map[k]||(map[k]={name:k,inns:0,balls:0,runs:0,wkts:0,wides:0,noballs:0,dots:0,best:{w:-1,r:0},threeFer:0,fiveFer:0});
    p.inns++;p.balls+=balls;p.runs+=int(raw.runs);p.wkts+=int(raw.wickets);p.wides+=int(raw.wides);p.noballs+=int(raw.noballs);p.dots+=int(raw.dots);
    const w=int(raw.wickets),r=int(raw.runs);
    if(w>p.best.w||(w===p.best.w&&r<p.best.r))p.best={w,r};
    if(w>=5)p.fiveFer++;else if(w>=3)p.threeFer++;
  }));
  return Object.values(map).map(p=>{
    p.overs=ballsToOvers(p.balls);
    p.econ=p.balls>0?p.runs/(p.balls/6):0;
    p.avg=p.wkts>0?p.runs/p.wkts:null;
    p.sr=p.wkts>0?p.balls/p.wkts:null;
    p.bbi=p.best.w>=0?p.best.w+"/"+p.best.r:"—";
    return p;
  });
}
function fieldingAgg(ms){
  ms=ms||DATA.matches; const map={};
  ms.forEach(m=>(m.fielding||[]).forEach(f=>{
    const k=f.name; if(!k)return;
    const p=map[k]||(map[k]={name:k,catches:0,runouts:0,stumpings:0});
    p.catches+=int(f.catches);p.runouts+=int(f.runouts);p.stumpings+=int(f.stumpings);
  }));
  return Object.values(map).map(p=>{p.total=p.catches+p.runouts+p.stumpings;return p;});
}
function captainAgg(ms){
  ms=ms||DATA.matches; const map={};
  ms.forEach(m=>{
    const c=m.captain||"—";
    const p=map[c]||(map[c]={name:c,played:0,w:0,l:0,t:0,nr:0,rf:0,ra:0});
    p.played++; p.rf+=int(m.ourTotal); p.ra+=int(m.oppTotal);
    if(m.result==="won")p.w++;else if(m.result==="lost")p.l++;else if(m.result==="tie")p.t++;else p.nr++;
  });
  return Object.values(map).map(p=>{const dec=p.w+p.l+p.t;p.winPct=dec>0?p.w/dec*100:0;return p;});
}
function teamSummary(ms){
  ms=ms||DATA.matches; let w=0,l=0,t=0,nr=0,hi=0,lo=null,tot=0,cnt=0;
  ms.forEach(m=>{
    if(m.result==="won")w++;else if(m.result==="lost")l++;else if(m.result==="tie")t++;else nr++;
    const s=int(m.ourTotal); if(s>0){tot+=s;cnt++;if(s>hi)hi=s;if(lo===null||s<lo)lo=s;}
  });
  const dec=w+l+t;
  return {played:ms.length,w,l,t,nr,winPct:dec>0?w/dec*100:0,hi,lo:lo||0,avg:cnt>0?tot/cnt:0};
}
function rosterNames(){ return ((DATA.team&&DATA.team.players)||[]).map(p=>p.name); }
function allPlayers(){
  const s=new Set(rosterNames());
  DATA.matches.forEach(m=>{(m.batting||[]).forEach(b=>b.name&&s.add(b.name));(m.bowling||[]).forEach(b=>b.name&&s.add(b.name));(m.fielding||[]).forEach(b=>b.name&&s.add(b.name));});
  return [...s].sort();
}
function sortRows(rows,key,dir){
  return rows.slice().sort((a,b)=>{
    let x=a[key],y=b[key];
    if(x===null)x=-Infinity;if(y===null)y=-Infinity;
    if(typeof x==="string")return dir*x.localeCompare(y);
    return dir*(x-y);
  });
}

/* ---------- SVG / HTML charts (self-contained) ---------- */
function donut(segs,size=160){
  const total=segs.reduce((a,s)=>a+s.value,0);
  if(total<=0) return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${size/2*0.8}" fill="none" stroke="var(--line-soft)" stroke-width="${size*0.18}"/></svg>`;
  const nonzero=segs.filter(s=>s.value>0);
  const r=size/2,ir=r*0.62,cx=r,cy=r; let ang=-Math.PI/2,paths="";
  if(nonzero.length===1){
    return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}"><circle cx="${cx}" cy="${cy}" r="${(r+ir)/2}" fill="none" stroke="${nonzero[0].color}" stroke-width="${r-ir}"/></svg>`;
  }
  segs.forEach(s=>{
    if(s.value<=0)return;
    const frac=s.value/total,a2=ang+frac*2*Math.PI,large=frac>0.5?1:0;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi2=cx+ir*Math.cos(a2),yi2=cy+ir*Math.sin(a2),xi1=cx+ir*Math.cos(ang),yi1=cy+ir*Math.sin(ang);
    paths+=`<path d="M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} L${xi2} ${yi2} A${ir} ${ir} 0 ${large} 0 ${xi1} ${yi1} Z" fill="${s.color}"/>`;
    ang=a2;
  });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${paths}<text x="${cx}" y="${cy-4}" text-anchor="middle" fill="var(--cream)" font-family="var(--mono)" font-size="26" font-weight="600">${total}</text><text x="${cx}" y="${cy+15}" text-anchor="middle" fill="var(--muted)" font-size="10" letter-spacing="1">MATCHES</text></svg>`;
}
function legend(items){
  return `<div class="legend">${items.map(i=>`<div class="li"><span class="dot" style="background:${i.color}"></span>${esc(i.label)}<span class="val">${i.value}</span></div>`).join("")}</div>`;
}
function lineChart(pts,{w=580,h=150}={}){
  if(pts.length===0)return "";
  const pad=24, iw=w-pad*2, ih=h-pad*2;
  const max=Math.max(...pts.map(p=>p.v),1), min=Math.min(...pts.map(p=>p.v),0);
  const range=(max-min)||1;
  const X=i=>pad+(pts.length<=1?iw/2:i/(pts.length-1)*iw);
  const Y=v=>pad+ih-((v-min)/range)*ih;
  const line=pts.map((p,i)=>`${i?"L":"M"}${X(i).toFixed(1)} ${Y(p.v).toFixed(1)}`).join(" ");
  const area=line+` L${X(pts.length-1).toFixed(1)} ${(pad+ih).toFixed(1)} L${X(0).toFixed(1)} ${(pad+ih).toFixed(1)} Z`;
  const dots=pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="3.5" fill="var(--gold)"/><text x="${X(i).toFixed(1)}" y="${(Y(p.v)-9).toFixed(1)}" text-anchor="middle" fill="var(--muted)" font-size="10" font-family="var(--mono)">${p.v}</text>`).join("");
  const labs=pts.map((p,i)=>`<text x="${X(i).toFixed(1)}" y="${h-6}" text-anchor="middle" fill="var(--muted-2)" font-size="9">${esc(p.label||"")}</text>`).join("");
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" style="height:${h}px" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(232,184,75,.28)"/><stop offset="1" stop-color="rgba(232,184,75,0)"/></linearGradient></defs>
    <path d="${area}" fill="url(#ga)"/><path d="${line}" fill="none" stroke="var(--gold)" stroke-width="2"/>${dots}${labs}</svg>`;
}
function barsH(items){
  const max=Math.max(...items.map(i=>i.value),1);
  return `<div class="barsH">${items.map(i=>`<div class="barH">
    <div class="lab" ${i.href?`onclick="location.hash='${i.href}'"`:""}>${esc(i.label)}</div>
    <div class="track"><div class="fill" style="width:${Math.max(2,i.value/max*100)}%"></div></div>
    <div class="v">${i.display!=null?i.display:i.value}</div></div>`).join("")}</div>`;
}
function sparkBars(series){
  const max=Math.max(...series,1),w=Math.max(320,series.length*40),h=120,bw=Math.min(30,(w-20)/series.length-8);
  const bars=series.map((val,i)=>{const bh=Math.max(2,val/max*(h-28));const x=10+i*((w-20)/series.length);const y=h-bh-18;
    return `<rect class="bar" x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3"/><text x="${x+bw/2}" y="${y-4}" fill="var(--muted)" font-size="10" text-anchor="middle" font-family="var(--mono)">${val}</text>`;}).join("");
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${bars}</svg>`;
}

function viewScorecard(v,id){
  const m=DATA.matches.find(x=>x.id===id);
  if(!m){v.innerHTML=emptyBlock("Match not found");return;}
  const badge={won:"win",lost:"loss",tie:"tie"}[m.result]||"nr";
  const label={won:"Won",lost:"Lost",tie:"Tied"}[m.result]||"No result";
  const bat=(m.batting||[]).map(inn);
  const bt=bat.reduce((a,b)=>({r:a.r+b.runs,b:a.b+b.balls,f:a.f+b.fours,s:a.s+b.sixes}),{r:0,b:0,f:0,s:0});
  const extras=int(m.ourTotal)-bt.r;
  v.innerHTML=`
  <a href="#/matches" class="btn ghost sm" style="margin-bottom:16px">← All matches</a>
  <div class="scoreboard"><div class="sb-top">
    <div><div class="sb-eyebrow">${fmtDate(m.date)} • ${esc(m.ground||"—")}${m.format?" • "+esc(m.format):""}</div>
      <div class="sb-title" style="font-size:28px">Gold Hayat vs ${esc(m.opponent)}</div>
      <div class="sb-sub">${m.captain?'<span class="chip cap">© Captain: '+esc(m.captain)+'</span> ':""}Toss: ${esc(m.toss||"—")}${m.decision?" · chose to "+esc(m.decision):""}${m.motm?' · <span class="star">★</span> MOTM: '+esc(m.motm):""}</div></div>
    <div style="text-align:right"><span class="badge ${badge}" style="font-size:12px">${label}</span>
      <div class="sb-stat" style="margin-top:10px"><div class="n tnum">${m.ourTotal}/${m.ourWickets}</div><div class="l">Gold Hayat (${esc(m.ourOvers||"")} ov)</div></div>
      <div class="sb-stat" style="margin-top:8px"><div class="n tnum" style="font-size:20px;color:var(--muted)">${m.oppTotal}/${m.oppWickets}</div><div class="l">${esc(m.opponent)} (${esc(m.oppOvers||"")} ov)</div></div></div>
  </div></div>

  <div class="sc-section-title">Gold Hayat — Batting</div>
  <div class="table-wrap table-scroll"><table>
    <thead><tr><th class="l">Batsman</th><th class="l">How out</th><th>R</th><th>B</th><th>0s</th><th>1s</th><th>2s</th><th>3s</th><th>4s</th><th>6s</th><th>SR</th></tr></thead>
    <tbody>${bat.map(b=>`<tr>
      <td class="l pname clickable" onclick="location.hash='#/player/${encodeURIComponent(b.name)}'">${esc(b.name)}${b.out?"":' <span class="chip">not out</span>'}</td>
      <td class="l dismissal">${dismissalText(b)}</td>
      <td class="hi tnum">${b.runs}</td><td class="tnum dim">${b.balls}</td><td class="tnum dim">${b.dots}</td><td class="tnum dim">${b.ones}</td><td class="tnum dim">${b.twos}</td><td class="tnum dim">${b.threes}</td>
      <td class="tnum">${b.fours}</td><td class="tnum">${b.sixes}</td><td class="tnum">${b.balls?(b.runs/b.balls*100).toFixed(0):"—"}</td></tr>`).join("")}</tbody>
    <tfoot><tr style="border-top:1px solid var(--line)">
      <td class="l" style="font-family:var(--mono);color:var(--cream)">Total</td><td class="l dim">Extras ${extras>=0?extras:0} • ${esc(m.ourOvers||"")} ov</td>
      <td class="hi tnum">${m.ourTotal}</td><td class="tnum dim">${bt.b}</td><td colspan="4"></td><td class="tnum">${bt.f}</td><td class="tnum">${bt.s}</td><td></td></tr></tfoot>
  </table></div>

  <div class="sc-section-title">Gold Hayat — Bowling</div>
  <div class="table-wrap table-scroll"><table>
    <thead><tr><th class="l">Bowler</th><th>O</th><th>R</th><th>W</th><th>Econ</th><th>Dots</th><th>Wd</th><th>Nb</th></tr></thead>
    <tbody>${(m.bowling||[]).map(b=>{const balls=oversToBalls(b.overs);const e=balls?int(b.runs)/(balls/6):0;return `<tr>
      <td class="l pname clickable" onclick="location.hash='#/player/${encodeURIComponent(b.name)}'">${esc(b.name)}</td>
      <td class="tnum">${esc(b.overs)}</td><td class="tnum">${b.runs}</td><td class="hi tnum">${b.wickets}</td><td class="tnum">${e.toFixed(1)}</td><td class="tnum dim">${b.dots}</td><td class="tnum dim">${b.wides}</td><td class="tnum dim">${b.noballs}</td></tr>`;}).join("")}</tbody>
  </table></div>

  ${(m.fielding&&m.fielding.length)?`<div class="sc-section-title">Gold Hayat — Fielding</div>
  <div class="table-wrap table-scroll"><table>
    <thead><tr><th class="l">Fielder</th><th>Catches</th><th>Run-outs</th><th>Stumpings</th></tr></thead>
    <tbody>${m.fielding.map(f=>`<tr><td class="l pname clickable" onclick="location.hash='#/player/${encodeURIComponent(f.name)}'">${esc(f.name)}</td><td class="tnum">${f.catches}</td><td class="tnum">${f.runouts}</td><td class="tnum">${f.stumpings}</td></tr>`).join("")}</tbody>
  </table></div>`:""}`;
}

function viewPlayer(v,name){
  const b=battingAgg().find(p=>p.name===name);
  const w=bowlingAgg().find(p=>p.name===name);
  const f=fieldingAgg().find(p=>p.name===name);
  const log=DATA.matches.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")).map(m=>({m,bat:(m.batting||[]).map(inn).find(x=>x.name===name),bw:(m.bowling||[]).find(x=>x.name===name)})).filter(r=>r.bat||r.bw);
  const vsMap={};
  DATA.matches.forEach(m=>{
    (m.batting||[]).map(inn).forEach(x=>{if(x.name!==name)return;const t=vsMap[m.opponent]||(vsMap[m.opponent]={opp:m.opponent,inns:0,runs:0,wkts:0,balls:0});t.inns++;t.runs+=x.runs;t.balls+=x.balls;});
    (m.bowling||[]).forEach(x=>{if(x.name!==name)return;const t=vsMap[m.opponent]||(vsMap[m.opponent]={opp:m.opponent,inns:0,runs:0,wkts:0,balls:0});t.wkts+=int(x.wickets);});
  });
  const vs=Object.values(vsMap);
  const runsSeries=log.filter(r=>r.bat).map(r=>r.bat.runs);
  v.innerHTML=`
  <a href="#/players" class="btn ghost sm" style="margin-bottom:16px">← All players</a>
  <div class="profile-head"><div class="avatar">${initials(name)}</div><div><h2>${esc(name)}</h2><div class="role">${b?b.inns+" batting inns":""}${w?" · "+w.inns+" bowling inns":""}</div></div></div>
  <div class="grid c4" style="margin:20px 0">
    <div class="card stat-card"><div class="k">Runs</div><div class="v tnum">${b?b.runs:0}</div><div class="sub">HS ${b?b.hs+(b.hsNo?"*":""):"—"} · Avg ${b&&b.avg!=null?b.avg.toFixed(1):"—"}</div></div>
    <div class="card stat-card"><div class="k">Strike rate</div><div class="v tnum">${b?b.sr.toFixed(0):"—"}</div><div class="sub">${b?b.fours+" fours · "+b.sixes+" sixes":""}</div></div>
    <div class="card stat-card"><div class="k">Wickets</div><div class="v tnum">${w?w.wkts:0}</div><div class="sub">${w?"BBI "+w.bbi+" · Econ "+w.econ.toFixed(1):"—"}</div></div>
    <div class="card stat-card"><div class="k">Fielding</div><div class="v tnum">${f?f.total:0}</div><div class="sub">${f?f.catches+" ct · "+f.runouts+" ro · "+f.stumpings+" st":"—"}</div></div>
  </div>
  ${runsSeries.length>1?`<div class="chart-card" style="margin-bottom:20px"><div class="eyebrow" style="margin-bottom:12px">Runs per innings</div>${sparkBars(runsSeries)}</div>`:""}
  <div class="grid c2">
    <div><div class="eyebrow">Match by match</div><div class="table-wrap table-scroll"><table>
      <thead><tr><th class="l">Match</th><th>Bat</th><th>Bowl</th></tr></thead>
      <tbody>${log.map(r=>`<tr class="clickable" onclick="location.hash='#/match/${r.m.id}'"><td class="l"><span class="pname">vs ${esc(r.m.opponent)}</span><div class="dim" style="font-size:11px">${fmtDate(r.m.date)}</div></td>
        <td class="tnum">${r.bat?r.bat.runs+" ("+r.bat.balls+")":"—"}</td><td class="tnum">${r.bw?r.bw.wickets+"/"+r.bw.runs+" ("+esc(r.bw.overs)+")":"—"}</td></tr>`).join("")||emptyRow(3)}</tbody></table></div></div>
    <div><div class="eyebrow">Against each team</div><div class="table-wrap table-scroll"><table>
      <thead><tr><th class="l">Opponent</th><th>Inns</th><th>Runs</th><th>SR</th><th>Wkts</th></tr></thead>
      <tbody>${vs.map(t=>`<tr><td class="l pname">${esc(t.opp)}</td><td class="tnum dim">${t.inns}</td><td class="hi tnum">${t.runs}</td><td class="tnum">${t.balls?(t.runs/t.balls*100).toFixed(0):"—"}</td><td class="tnum">${t.wkts}</td></tr>`).join("")||emptyRow(5)}</tbody></table></div></div>
  </div>`;
}

function viewCaptain(v,name){
  const ms=getMatches({captain:name});
  if(!ms.length){v.innerHTML=emptyBlock("No matches under this captain");return;}
  const agg=captainAgg(ms)[0]||{played:0,w:0,l:0,t:0,nr:0,winPct:0};
  // vs each opponent
  const vs={};
  ms.forEach(m=>{const o=m.opponent;const t=vs[o]||(vs[o]={opp:o,p:0,w:0,l:0});t.p++;if(m.result==="won")t.w++;else if(m.result==="lost")t.l++;});
  const vsArr=Object.values(vs).map(t=>{const dec=t.p; t.pct=dec?t.w/dec*100:0; return t;});
  const topBat=sortRows(battingAgg(ms),"runs",-1)[0];
  const topBowl=sortRows(bowlingAgg(ms),"wkts",-1)[0];
  v.innerHTML=`
  <a href="#/captains" class="btn ghost sm" style="margin-bottom:16px">← All captains</a>
  <div class="profile-head"><div class="avatar">${initials(name)}</div><div><h2>${esc(name)} <span class="chip cap" style="font-size:12px;vertical-align:middle">Captain</span></h2><div class="role">${agg.played} matches led</div></div></div>
  <div class="grid c4" style="margin:20px 0">
    <div class="card stat-card"><div class="k">Played</div><div class="v tnum">${agg.played}</div></div>
    <div class="card stat-card"><div class="k">Won</div><div class="v tnum" style="color:var(--pitch)">${agg.w}</div></div>
    <div class="card stat-card"><div class="k">Lost</div><div class="v tnum" style="color:var(--ball)">${agg.l}</div></div>
    <div class="card stat-card"><div class="k">Win rate</div><div class="v tnum">${agg.winPct.toFixed(0)}%</div><div class="sub">${agg.t} tie · ${agg.nr} NR</div></div>
  </div>
  <div class="grid c2">
    <div><div class="eyebrow">Record vs each team</div><div class="table-wrap table-scroll"><table>
      <thead><tr><th class="l">Opponent</th><th>P</th><th>W</th><th>L</th><th>Win%</th></tr></thead>
      <tbody>${vsArr.map(t=>`<tr><td class="l pname">${esc(t.opp)}</td><td class="tnum dim">${t.p}</td><td class="tnum" style="color:var(--pitch)">${t.w}</td><td class="tnum" style="color:#e37a70">${t.l}</td><td class="hi tnum">${t.pct.toFixed(0)}%</td></tr>`).join("")}</tbody></table></div>
      <div class="grid c2" style="margin-top:16px">
        <div class="card stat-card"><div class="k">Top scorer under ${esc(name)}</div><div class="v" style="font-size:18px">${topBat?esc(topBat.name):"—"}</div><div class="sub">${topBat?topBat.runs+" runs":""}</div></div>
        <div class="card stat-card"><div class="k">Top bowler under ${esc(name)}</div><div class="v" style="font-size:18px">${topBowl?esc(topBowl.name):"—"}</div><div class="sub">${topBowl?topBowl.wkts+" wkts":""}</div></div>
      </div>
    </div>
    <div><div class="eyebrow">Matches led</div><div class="table-wrap">${ms.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(matchRow).join("")}</div></div>
  </div>`;
}

/* ============================================================ RECORDS ============================================================ */
function viewRecords(v){
  let bestBat=null,mostSixes=null;
  DATA.matches.forEach(m=>(m.batting||[]).map(inn).forEach(b=>{
    if(!bestBat||b.runs>bestBat.runs)bestBat={...b,opp:m.opponent,date:m.date,id:m.id};
    if(!mostSixes||b.sixes>mostSixes.sixes)mostSixes={...b,opp:m.opponent,id:m.id};
  }));
  let bestBowl=null;
  DATA.matches.forEach(m=>(m.bowling||[]).forEach(b=>{const w=int(b.wickets),r=int(b.runs);if(!bestBowl||w>bestBowl.w||(w===bestBowl.w&&r<bestBowl.r))bestBowl={name:b.name,w,r,opp:m.opponent,id:m.id};}));
  const topRuns=sortRows(battingAgg(),"runs",-1)[0];
  const topWkts=sortRows(bowlingAgg(),"wkts",-1)[0];
  const bestSR=sortRows(battingAgg().filter(p=>p.balls>=30),"sr",-1)[0];
  const bestEcon=sortRows(bowlingAgg().filter(p=>p.balls>=24),"econ",1)[0];
  const mostCt=sortRows(fieldingAgg(),"total",-1)[0];
  const bestCap=sortRows(captainAgg().filter(c=>c.played>=2),"winPct",-1)[0];
  const rec=(l,m,s)=>`<div class="card gold stat-card"><div class="k">${l}</div><div class="v" style="font-size:22px">${m}</div><div class="sub">${s}</div></div>`;
  v.innerHTML=`<div class="page-head"><div><div class="eyebrow">Hall of records</div><h2>Records</h2><p>Club bests across all recorded matches</p></div></div>
  <div class="grid c3">
    ${bestBat?rec("Highest score",esc(bestBat.name)+" — "+bestBat.runs,"vs "+esc(bestBat.opp)+" · "+fmtDate(bestBat.date)):""}
    ${bestBowl?rec("Best bowling",esc(bestBowl.name)+" — "+bestBowl.w+"/"+bestBowl.r,"vs "+esc(bestBowl.opp)):""}
    ${mostSixes&&mostSixes.sixes>0?rec("Most sixes (innings)",esc(mostSixes.name)+" — "+mostSixes.sixes,"vs "+esc(mostSixes.opp)):""}
    ${topRuns?rec("Most career runs",esc(topRuns.name)+" — "+topRuns.runs,topRuns.inns+" innings"):""}
    ${topWkts?rec("Most career wickets",esc(topWkts.name)+" — "+topWkts.wkts,topWkts.inns+" innings"):""}
    ${bestSR?rec("Best strike rate",esc(bestSR.name)+" — "+bestSR.sr.toFixed(0),"min 30 balls"):""}
    ${bestEcon?rec("Best economy",esc(bestEcon.name)+" — "+bestEcon.econ.toFixed(2),"min 4 overs"):""}
    ${mostCt&&mostCt.total>0?rec("Most dismissals (field)",esc(mostCt.name)+" — "+mostCt.total,mostCt.catches+" ct · "+mostCt.runouts+" ro"):""}
    ${bestCap?rec("Best captain (win%)",esc(bestCap.name)+" — "+bestCap.winPct.toFixed(0)+"%",bestCap.w+"W-"+bestCap.l+"L · min 2 games"):""}
  </div>
  <div class="eyebrow" style="margin-top:26px">Head to head</div>
  <div class="table-wrap table-scroll"><table>
    <thead><tr><th class="l">Opponent</th><th>Played</th><th>Won</th><th>Lost</th><th>Win%</th></tr></thead>
    <tbody>${opponents().map(o=>{const ms=DATA.matches.filter(m=>m.opponent===o);const w=ms.filter(m=>m.result==="won").length;const l=ms.filter(m=>m.result==="lost").length;const dec=w+l+ms.filter(m=>m.result==="tie").length;return `<tr><td class="l pname">${esc(o)}</td><td class="tnum dim">${ms.length}</td><td class="tnum" style="color:var(--pitch)">${w}</td><td class="tnum" style="color:#e37a70">${l}</td><td class="tnum hi">${dec?(w/dec*100).toFixed(0):"—"}%</td></tr>`;}).join("")||emptyRow(5)}</tbody>
  </table></div>`;
}
/* ============================================================ SQUAD (roster) ============================================================ */
function viewSquad(v){
  const players=(DATA.team&&DATA.team.players)||[];
  const playedCount=name=>DATA.matches.filter(m=>[...(m.batting||[]),...(m.bowling||[]),...(m.fielding||[])].some(x=>x.name===name)).length;
  v.innerHTML=`<div class="page-head"><div><div class="eyebrow">Manage</div><h2>Squad</h2><p>Your team roster. These names auto-suggest on the scorecard. Add or remove players any time — a substitute can be added here whenever needed.</p></div></div>
  <div class="form-section"><h3>Add a player</h3>
    <div class="controls" style="margin:0">
      <div class="field" style="flex:1;min-width:220px"><label>Player name</label><input id="sq-name" placeholder="e.g. Umair Suzuki" onkeydown="if(event.key==='Enter'){addSquadPlayer();}"></div>
      <div class="field"><label>Type</label><select id="sq-type"><option value="regular">Regular</option><option value="sub">Substitute</option></select></div>
      <button class="btn primary" onclick="addSquadPlayer()">+ Add player</button>
    </div>
  </div>
  <div class="table-wrap table-scroll"><table>
    <thead><tr><th class="l">#</th><th class="l">Player</th><th class="l">Type</th><th>Matches</th><th class="l">Actions</th></tr></thead>
    <tbody>${players.length?players.map((p,i)=>`<tr>
      <td class="l rank">${i+1}</td>
      <td class="l pname">${esc(p.name)}</td>
      <td class="l">${p.sub?'<span class="chip cap">Substitute</span>':'<span class="chip">Regular</span>'}</td>
      <td class="tnum dim">${playedCount(p.name)}</td>
      <td class="l" style="white-space:nowrap"><button class="btn ghost sm" onclick="toggleSub('${encodeURIComponent(p.name)}')">${p.sub?'Make regular':'Mark sub'}</button>
        <button class="btn danger sm" onclick="removeSquadPlayer('${encodeURIComponent(p.name)}')">Remove</button></td></tr>`).join(''):`<tr><td class="l dim" colspan="5">No players yet — add your squad above.</td></tr>`}</tbody>
  </table></div>
  <div class="notice" style="margin-top:16px">Removing a player from this list only removes the name from suggestions — <b>past match stats are never deleted</b>. A one-off substitute can also just be typed straight into a scorecard without adding them here first.</div>`;
}
function addSquadPlayer(){
  const el=$("#sq-name"); if(!el)return; const name=(el.value||"").trim(); if(!name)return;
  if(!DATA.team) DATA.team={name:TEAM_NAME}; if(!Array.isArray(DATA.team.players)) DATA.team.players=[];
  if(DATA.team.players.some(p=>p.name.toLowerCase()===name.toLowerCase())){alert(name+" is already in the squad.");return;}
  const sub=($("#sq-type")||{}).value==="sub";
  DATA.team.players.push({name,sub}); saveLocal(); setDirty(true); renderNav(); router();
}
function removeSquadPlayer(enc){
  const name=decodeURIComponent(enc);
  if(!confirm("Remove "+name+" from the squad list?\n(Past match stats stay intact.)"))return;
  DATA.team.players=((DATA.team&&DATA.team.players)||[]).filter(p=>p.name!==name); saveLocal(); setDirty(true); renderNav(); router();
}
function toggleSub(enc){
  const name=decodeURIComponent(enc);
  ((DATA.team&&DATA.team.players)||[]).forEach(p=>{if(p.name===name)p.sub=!p.sub;}); saveLocal(); setDirty(true); router();
}

/* ============================================================ ADD MATCH ============================================================ */
let rowSeq=0;
function viewAdd(v){
  v.innerHTML=`<div class="page-head"><div><div class="eyebrow">New entry</div><h2>Add match</h2><p>Enter batting, bowling, fielding &amp; captain — runs, balls and strike rate are calculated for you</p></div></div>
  <div class="notice">Enter <b>dots, 1s, 2s, 3s, 4s and 6s</b> per batsman; runs &amp; balls compute automatically. This adds to your existing record — nothing is overwritten. After saving, open <b>Data &amp; publish</b> to download <b>data.json</b> and commit it to GitHub.</div>
  <div class="form-section"><h3>Match details</h3><div class="form-grid">
    <div class="field"><label>Date</label><input type="date" id="f-date"></div>
    <div class="field"><label>Opponent</label><input id="f-opp" placeholder="Team name" list="opp-list"><datalist id="opp-list">${opponents().map(o=>`<option value="${esc(o)}">`).join("")}</datalist></div>
    <div class="field"><label>Captain (ours)</label><input id="f-captain" placeholder="Captain name" list="cap-list"><datalist id="cap-list">${captains().map(o=>`<option value="${esc(o)}">`).join("")}</datalist></div>
    <div class="field"><label>Ground</label><input id="f-ground" placeholder="Venue"></div>
    <div class="field"><label>Format</label><select id="f-format">${FORMATS.map(f=>`<option value="${esc(f)}">${esc(f)}</option>`).join("")}</select></div>
    <div class="field"><label>Toss</label><select id="f-toss"><option>won</option><option>lost</option></select></div>
    <div class="field"><label>Chose to</label><select id="f-decision"><option>bat</option><option>bowl</option></select></div>
    <div class="field"><label>Our total</label><input type="number" id="f-ourtotal" placeholder="0"></div>
    <div class="field"><label>Our wickets</label><input type="number" id="f-ourwkts" placeholder="0"></div>
    <div class="field"><label>Our overs</label><input id="f-ourovers" placeholder="20"></div>
    <div class="field"><label>Opponent total</label><input type="number" id="f-opptotal" placeholder="0"></div>
    <div class="field"><label>Opponent wickets</label><input type="number" id="f-oppwkts" placeholder="0"></div>
    <div class="field"><label>Opponent overs</label><input id="f-oppovers" placeholder="20"></div>
    <div class="field"><label>Result</label><select id="f-result"><option value="won">Won</option><option value="lost">Lost</option><option value="tie">Tie</option><option value="nr">No result</option></select></div>
    <div class="field"><label>Man of the match</label><input id="f-motm" placeholder="Our player"></div>
  </div></div>
  <div class="form-section"><h3>Batting card — Gold Hayat</h3><div class="table-scroll"><table class="entry-table">
    <thead><tr><th class="l">Batsman</th><th>0s</th><th>1s</th><th>2s</th><th>3s</th><th>4s</th><th>6s</th><th class="l">How out</th><th class="l">Bowler/Fielder</th><th>R (B) SR</th><th></th></tr></thead>
    <tbody id="bat-rows"></tbody></table></div>
    <button class="btn ghost sm" style="margin-top:10px" onclick="addBatRow()">+ Add batsman</button>
    <div class="total-line">Batting runs: <span id="bat-total" class="diff">0</span></div></div>
  <div class="form-section"><h3>Bowling card — Gold Hayat</h3><div class="table-scroll"><table class="entry-table">
    <thead><tr><th class="l">Bowler</th><th>Overs</th><th>Runs</th><th>Wkts</th><th>Dots</th><th>Wides</th><th>NoBalls</th><th>Econ</th><th></th></tr></thead>
    <tbody id="bowl-rows"></tbody></table></div>
    <button class="btn ghost sm" style="margin-top:10px" onclick="addBowlRow()">+ Add bowler</button></div>
  <div class="form-section"><h3>Fielding — Gold Hayat</h3><div class="table-scroll"><table class="entry-table">
    <thead><tr><th class="l">Fielder</th><th>Catches</th><th>Run-outs</th><th>Stumpings</th><th></th></tr></thead>
    <tbody id="field-rows"></tbody></table></div>
    <button class="btn ghost sm" style="margin-top:10px" onclick="addFieldRow()">+ Add fielder</button></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap">
    <button class="btn primary" onclick="saveMatch()">Save match</button>
    <button class="btn ghost" onclick="location.hash='#/add';router()">Reset form</button>
    <span id="save-msg" style="align-self:center;color:var(--pitch);font-weight:600"></span></div>`;
  for(let i=0;i<5;i++)addBatRow();
  for(let i=0;i<5;i++)addBowlRow();
  for(let i=0;i<3;i++)addFieldRow();
}
function playerListOptions(){return allPlayers().map(n=>`<option value="${esc(n)}">`).join("");}
function ensureDatalist(){if(!$("#pl-all")){const dl=document.createElement("datalist");dl.id="pl-all";dl.innerHTML=playerListOptions();document.body.appendChild(dl);}}
function addBatRow(){
  const id="b"+(rowSeq++),tr=document.createElement("tr");tr.id=id;
  tr.innerHTML=`<td><input class="name" list="pl-all" data-k="name" placeholder="Name"></td>
    <td><input class="num" type="number" data-k="dots" oninput="recalcBat('${id}')" placeholder="0"></td>
    <td><input class="num" type="number" data-k="ones" oninput="recalcBat('${id}')" placeholder="0"></td>
    <td><input class="num" type="number" data-k="twos" oninput="recalcBat('${id}')" placeholder="0"></td>
    <td><input class="num" type="number" data-k="threes" oninput="recalcBat('${id}')" placeholder="0"></td>
    <td><input class="num" type="number" data-k="fours" oninput="recalcBat('${id}')" placeholder="0"></td>
    <td><input class="num" type="number" data-k="sixes" oninput="recalcBat('${id}')" placeholder="0"></td>
    <td><select data-k="dismissal">${DISMISSALS.map(d=>`<option value="${d}">${d==="notout"?"not out":d}</option>`).join("")}</select></td>
    <td><input data-k="who" placeholder="opp. bowler / fielder" style="min-width:130px"></td>
    <td class="calc" id="calc-${id}">0 (0)</td>
    <td><button class="row-del" onclick="this.closest('tr').remove();recalcBatTotal()">×</button></td>`;
  $("#bat-rows").appendChild(tr);ensureDatalist();
}
function addBowlRow(){
  const id="w"+(rowSeq++),tr=document.createElement("tr");tr.id=id;
  tr.innerHTML=`<td><input class="name" list="pl-all" data-k="name" placeholder="Name"></td>
    <td><input class="num" data-k="overs" oninput="recalcBowl('${id}')" placeholder="4"></td>
    <td><input class="num" type="number" data-k="runs" oninput="recalcBowl('${id}')" placeholder="0"></td>
    <td><input class="num" type="number" data-k="wickets" placeholder="0"></td>
    <td><input class="num" type="number" data-k="dots" placeholder="0"></td>
    <td><input class="num" type="number" data-k="wides" placeholder="0"></td>
    <td><input class="num" type="number" data-k="noballs" placeholder="0"></td>
    <td class="calc" id="calc-${id}">—</td>
    <td><button class="row-del" onclick="this.closest('tr').remove()">×</button></td>`;
  $("#bowl-rows").appendChild(tr);ensureDatalist();
}
function addFieldRow(){
  const id="f"+(rowSeq++),tr=document.createElement("tr");tr.id=id;
  tr.innerHTML=`<td><input class="name" list="pl-all" data-k="name" placeholder="Name"></td>
    <td><input class="num" type="number" data-k="catches" placeholder="0"></td>
    <td><input class="num" type="number" data-k="runouts" placeholder="0"></td>
    <td><input class="num" type="number" data-k="stumpings" placeholder="0"></td>
    <td><button class="row-del" onclick="this.closest('tr').remove()">×</button></td>`;
  $("#field-rows").appendChild(tr);ensureDatalist();
}
function rowVal(id,k){const el=document.querySelector("#"+id+" [data-k='"+k+"']");return el?el.value:"";}
function recalcBat(id){
  const o=int(rowVal(id,"ones")),t=int(rowVal(id,"twos")),th=int(rowVal(id,"threes")),f=int(rowVal(id,"fours")),s=int(rowVal(id,"sixes")),d=int(rowVal(id,"dots"));
  const runs=o+2*t+3*th+4*f+6*s,balls=d+o+t+th+f+s,sr=balls?(runs/balls*100).toFixed(0):"0";
  const c=$("#calc-"+id); if(c)c.textContent=runs+" ("+balls+") "+(balls?"·SR"+sr:"");
  recalcBatTotal();
}
function recalcBatTotal(){
  let tot=0;document.querySelectorAll("#bat-rows tr").forEach(tr=>{const g=k=>int((tr.querySelector("[data-k='"+k+"']")||{}).value);tot+=g("ones")+2*g("twos")+3*g("threes")+4*g("fours")+6*g("sixes");});
  const el=$("#bat-total"); if(el)el.textContent=tot;
}
function recalcBowl(id){const balls=oversToBalls(rowVal(id,"overs")),runs=int(rowVal(id,"runs"));const c=$("#calc-"+id);if(c)c.textContent=balls?(runs/(balls/6)).toFixed(1):"—";}
function saveMatch(){
  const g=id=>($("#"+id)||{}).value||"";
  const bat=[];document.querySelectorAll("#bat-rows tr").forEach((tr,i)=>{
    const gk=k=>(tr.querySelector("[data-k='"+k+"']")||{}).value||"";
    const name=gk("name").trim();if(!name)return;
    const dis=gk("dismissal"),who=gk("who").trim();
    const rec={name,dots:int(gk("dots")),ones:int(gk("ones")),twos:int(gk("twos")),threes:int(gk("threes")),fours:int(gk("fours")),sixes:int(gk("sixes")),dismissal:dis,position:i+1};
    if(who){if(dis==="caught"||dis==="stumped"||dis==="runout")rec.fielder=who;else rec.bowler=who;}
    bat.push(rec);
  });
  const bowl=[];document.querySelectorAll("#bowl-rows tr").forEach(tr=>{
    const gk=k=>(tr.querySelector("[data-k='"+k+"']")||{}).value||"";
    const name=gk("name").trim();if(!name)return;
    bowl.push({name,overs:gk("overs").trim()||"0",runs:int(gk("runs")),wickets:int(gk("wickets")),dots:int(gk("dots")),wides:int(gk("wides")),noballs:int(gk("noballs"))});
  });
  const field=[];document.querySelectorAll("#field-rows tr").forEach(tr=>{
    const gk=k=>(tr.querySelector("[data-k='"+k+"']")||{}).value||"";
    const name=gk("name").trim();if(!name)return;
    const c=int(gk("catches")),r=int(gk("runouts")),s=int(gk("stumpings"));if(c+r+s===0)return;
    field.push({name,catches:c,runouts:r,stumpings:s});
  });
  if(!g("f-opp").trim()){alert("Please enter the opponent name.");return;}
  if(bat.length===0){alert("Add at least one batsman.");return;}
  const match={id:"m"+Date.now(),date:g("f-date")||new Date().toISOString().slice(0,10),
    opponent:g("f-opp").trim(),captain:g("f-captain").trim(),ground:g("f-ground").trim(),format:g("f-format").trim(),
    toss:g("f-toss"),decision:g("f-decision"),
    ourTotal:int(g("f-ourtotal")),ourWickets:int(g("f-ourwkts")),ourOvers:g("f-ourovers").trim(),
    oppTotal:int(g("f-opptotal")),oppWickets:int(g("f-oppwkts")),oppOvers:g("f-oppovers").trim(),
    result:g("f-result"),motm:g("f-motm").trim(),batting:bat,bowling:bowl,fielding:field};
  DATA.matches.push(match);saveLocal();setDirty(true);renderNav();
  const el=$("#save-msg");if(el)el.textContent="✓ Saved. Go to Data & publish to export.";
  setTimeout(()=>{location.hash="#/match/"+match.id;},700);
}

/* ============================================================ DATA & PUBLISH ============================================================ */
function viewData(v){
  const json=JSON.stringify(DATA,null,2);
  v.innerHTML=`<div class="page-head"><div><div class="eyebrow">Manage</div><h2>Data &amp; publish</h2><p>Your permanent record lives in data.json on GitHub. Export, back up, import or merge here.</p></div></div>
  <div class="notice"><b>Sunday routine:</b> add each match on the Add match tab → come here → <b>Download data.json</b> → upload/replace it in your GitHub repo and commit. Previous matches are always kept; new ones are appended. This browser also holds an automatic working copy so nothing is lost mid-session.</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px">
    <button class="btn primary" onclick="downloadData()">⬇ Download data.json</button>
    <button class="btn ghost" onclick="downloadBackup()">⬇ Dated backup</button>
    <label class="btn ghost" style="cursor:pointer">⬆ Merge from file<input type="file" accept="application/json" style="display:none" onchange="importFile(this,true)"></label>
    <label class="btn ghost" style="cursor:pointer">⬆ Replace from file<input type="file" accept="application/json" style="display:none" onchange="importFile(this,false)"></label>
    <button class="btn ghost" onclick="copyData()">Copy JSON</button>
    <button class="btn danger" onclick="resetData()">Reset to sample</button>
    <button class="btn danger" onclick="clearAll()">Clear all matches</button>
  </div>
  <div class="eyebrow">Current data (${DATA.matches.length} matches)</div>
  <textarea id="json-box" spellcheck="false">${esc(json)}</textarea>
  <div style="display:flex;gap:10px;margin-top:10px"><button class="btn primary" onclick="applyJson()">Apply edits from box</button></div>
  <div class="hr"></div>
  <div class="eyebrow">One-time setup (free public link on GitHub Pages)</div>
  <div class="card" style="line-height:1.75;font-size:13.5px;color:var(--text)">
    1. Create a free GitHub account and a new <b>public</b> repository (e.g. <span class="chip">gold-hayat</span>).<br>
    2. Upload two files: this <b>index.html</b> and your <b>data.json</b>.<br>
    3. Repo <b>Settings → Pages → Source: main branch</b> → Save.<br>
    4. Your public link appears there, like <span class="chip">https://yourname.github.io/gold-hayat/</span>. Share it with anyone.<br>
    5. Every Sunday: add matches here, download the new <b>data.json</b>, re-upload it to the repo, commit. Done.
  </div>
  <div class="notice" style="margin-top:18px">Tip: keep a <b>Dated backup</b> after every match day in a Drive/WhatsApp folder. If a device is ever lost, import the latest backup and you're fully restored.</div>`;
}
function downloadData(){const blob=new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="data.json";a.click();setDirty(false);}
function downloadBackup(){const d=new Date().toISOString().slice(0,10);const blob=new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="goldhayat-backup-"+d+".json";a.click();}
function copyData(){navigator.clipboard.writeText(JSON.stringify(DATA,null,2)).then(()=>alert("JSON copied to clipboard."));}
function importFile(inp,merge){
  const file=inp.files[0];if(!file)return;const r=new FileReader();
  r.onload=()=>{try{const j=JSON.parse(r.result);if(!j.matches)throw 0;
    if(merge){const seen=new Set(DATA.matches.map(m=>m.id));let added=0;j.matches.forEach(m=>{if(!seen.has(m.id)){DATA.matches.push(m);added++;}});alert("Merged: "+added+" new match(es) added, existing kept.");}
    else{DATA=j;alert("Replaced with "+j.matches.length+" matches.");}
    saveLocal();setDirty(true);renderNav();router();
  }catch(e){alert("That file isn't a valid data.json");}};
  r.readAsText(file);inp.value="";
}
function applyJson(){try{const j=JSON.parse($("#json-box").value);if(!j.matches)throw 0;DATA=j;saveLocal();setDirty(true);renderNav();router();}catch(e){alert("Invalid JSON — check for typos.");}}
function resetData(){if(confirm("Replace everything with the built-in sample data?")){DATA=JSON.parse(JSON.stringify(SAMPLE_DATA));saveLocal();setDirty(true);renderNav();router();}}
function clearAll(){if(confirm("Delete ALL matches? Make sure you have a backup first.")){DATA={team:DATA.team||{name:"Gold Hayat Cricket Team"},matches:[]};saveLocal();setDirty(true);renderNav();router();}}

Object.assign(window,{addBatRow,addBowlRow,addFieldRow,recalcBat,recalcBowl,recalcBatTotal,saveMatch,downloadData,downloadBackup,copyData,importFile,applyJson,resetData,clearAll,router,viewSquad,addSquadPlayer,removeSquadPlayer,toggleSub});

/* ---------- Boot ---------- */
$("#menuBtn").addEventListener("click",()=>$("#drawer").classList.toggle("open"));
$("#drawer").addEventListener("click",e=>{if(e.target.id==="drawer")$("#drawer").classList.remove("open");});
window.addEventListener("hashchange",router);
(async function(){DATA=await loadData();renderNav();router();})();

</script>
