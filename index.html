  }
};
window.liveEndInnings=()=>{
  if(LIVE.phase==="batting"){ LIVE.bat.done=true; LIVE.phase="bowling"; }
  else { LIVE.bowl.done=true; LIVE.phase="batting"; if(!LIVE.bat.order.length){/* stay to score batting */} }
  liveCommit();
};
function liveToMatch(){
  const b=LIVE.bat, w=LIVE.bowl;
  const batting=b.order.map((nm,i)=>{ const p=b.players[nm]; return {name:nm,dots:p.dots,ones:p.ones,twos:p.twos,threes:p.threes,fours:p.fours,sixes:p.sixes,dismissal:p.out?p.dismissal:"notout",position:i+1}; });
  const bowling=Object.keys(w.bowlers).map(nm=>{ const p=w.bowlers[nm]; return {name:nm,overs:oversStr(p.balls),runs:p.runs,wickets:p.wickets,bowled:p.bowled,lbw:p.lbw,caught:p.caught,stumped:p.stumped,ones:p.ones,twos:p.twos,threes:p.threes,fours:p.fours,sixes:p.sixes,dots:p.dots,wides:p.wides,noballs:p.noballs}; });
  const fielding=Object.keys(LIVE.field||{}).map(nm=>({name:nm,catches:LIVE.field[nm].catches,runouts:LIVE.field[nm].runouts,stumpings:LIVE.field[nm].stumpings}));
  const m=LIVE.meta;
  return { date:m.date,opponent:m.opponent,ground:m.ground,venueType:m.venueType,format:m.format,captain:m.captain,toss:m.toss,decision:m.decision,xi:(LIVE.xi&&LIVE.xi.length?LIVE.xi.slice():undefined),
    ourTotal:b.total,ourWickets:b.wickets,ourOvers:oversStr(b.legalBalls),
    oppTotal:w.oppTotal,oppWickets:w.oppWkts,oppOvers:oversStr(w.legalBalls),
    result:"",motm:"",batting,bowling,fielding };
}
window.liveFinish=()=>{
  const match=liveToMatch();
  if(!match.batting.length && !match.bowling.length){ alert("Score at least a few balls first."); return; }
  FORMPREFILL=match;
  try{localStorage.removeItem(LS_LIVE);}catch(e){} LIVE=null;
  location.hash="#/add"; router();
};

function liveSetupForm(){
  const today=new Date().toISOString().slice(0,10);
  return `<div class="page-head"><div><div class="eyebrow">Live scoring</div><h2>Start a live match</h2><p>Score ball-by-ball during the game. It auto-saves in this browser after every tap; when you finish, it fills a full scorecard for review.</p></div></div>
  <div class="form-section"><h3>Match setup</h3><div class="form-grid">
    <div class="field"><label>Date</label><input type="date" id="lv-date" value="${today}"></div>
    <div class="field"><label>Opponent</label><input id="lv-opp" list="opp-list-lv" placeholder="Team"><datalist id="opp-list-lv">${opponents().map(o=>`<option value="${esc(o)}">`).join("")}</datalist></div>
    <div class="field"><label>Venue</label><input id="lv-venue" list="venue-list-lv" placeholder="Ground"><datalist id="venue-list-lv">${venues().map(g=>`<option value="${esc(g)}">`).join("")}</datalist></div>
    <div class="field"><label>Match at</label><select id="lv-type"><option value="">—</option><option value="home">Our venue (Home)</option><option value="away">Their venue (Away)</option><option value="neutral">Neutral</option></select></div>
    <div class="field"><label>Format</label><select id="lv-format" onchange="onLiveFormat()">${FORMATS.map(f=>`<option value="${esc(f)}">${esc(f)}</option>`).join("")}</select></div>
    <div class="field"><label>Overs per side</label><input type="number" id="lv-overs" list="lv-overs-list" value="${FMT_OVERS[FORMATS[0]]||""}" placeholder="e.g. 8"><datalist id="lv-overs-list"><option value="8"><option value="10"><option value="15"><option value="20"><option value="25"><option value="40"><option value="50"></datalist></div>
    <div class="field"><label>Captain (ours)</label><input id="lv-captain" list="cap-list-lv" placeholder="Captain"><datalist id="cap-list-lv">${captains().map(o=>`<option value="${esc(o)}">`).join("")}</datalist></div>
    <div class="field"><label>Toss</label><select id="lv-toss"><option>won</option><option>lost</option></select></div>
    <div class="field"><label>We are…</label><select id="lv-decision"><option value="bat">Batting first</option><option value="bowl">Bowling first</option></select></div>
  </div>
  <button class="btn primary" style="margin-top:14px" onclick="liveStart()">▶ Start live match</button></div>`;
}
function pad(){
  return `<div class="lv-keypad">
    <div class="lv-keys-runs">
      <button class="lv-key" onclick="onLiveRun(0)"><span class="k-n">0</span><span class="k-l">dot</span></button>
      <button class="lv-key" onclick="onLiveRun(1)"><span class="k-n">1</span><span class="k-l">single</span></button>
      <button class="lv-key" onclick="onLiveRun(2)"><span class="k-n">2</span><span class="k-l">two</span></button>
      <button class="lv-key" onclick="onLiveRun(3)"><span class="k-n">3</span><span class="k-l">three</span></button>
      <button class="lv-key four" onclick="onLiveRun(4)"><span class="k-n">4</span><span class="k-l">four</span></button>
      <button class="lv-key six" onclick="onLiveRun(6)"><span class="k-n">6</span><span class="k-l">six</span></button>
    </div>
    <div class="lv-keys-act">
      <button class="lv-key act ext" onclick="onLiveExtra('wd')">Wide</button>
      <button class="lv-key act ext" onclick="onLiveExtra('nb')">No ball</button>
      <button class="lv-key act wkt" onclick="onLiveWicketStart()">Wicket</button>
      <button class="lv-key act undo" onclick="liveUndo()">↶ Undo</button>
    </div>
  </div>`;
}
function recentChips(arr){
  const bead=x=>{let c="";if(x==="4")c="b4";else if(x==="6")c="b6";else if(x==="W")c="bw";else if(x==="Wd"||x==="Nb")c="bx";return `<span class="lv-bead ${c}">${esc(x)}</span>`;};
  return `<div class="lv-timeline"><span class="lbl">Recent</span>${(arr&&arr.length)?arr.map(bead).join(""):'<span class="dim">—</span>'}</div>`;
}
function batSelect(id,exclude){ const opts=liveSquad().filter(n=>!exclude.includes(n)); return `<select id="${id}"><option value="">Select…</option>${opts.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join("")}</select>`; }
function viewLive(v){
  if(!liveActive()){ v.innerHTML=liveSetupForm(); return; }
  const m=LIVE.meta;
  const R=p=>p.ones+2*p.twos+3*p.threes+4*p.fours+6*p.sixes;
  const toolbar=`<div class="lv-toolbar">
    <div class="lv-tag"><span class="lv-live-dot"></span>LIVE <span class="dim">· Match #${String(nextMatchNo()).padStart(4,"0")} · vs ${esc(m.opponent)}${m.ground?" · "+esc(m.ground):""}</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ghost sm" onclick="liveAddSubPrompt()">＋ Sub</button>
      <button class="btn ghost sm" onclick="liveEndInnings()">End innings ⇄</button>
      <button class="btn primary sm" onclick="liveFinish()">✓ Finish &amp; review</button>
      <button class="btn danger sm" onclick="liveDiscard()">Discard</button>
    </div></div>`;

  if(!(LIVE.xi&&LIVE.xi.length)){
    v.innerHTML=`<div class="lv-toolbar"><div class="lv-tag"><span class="lv-live-dot"></span>SETUP <span class="dim">· Match #${String(nextMatchNo()).padStart(4,"0")} · vs ${esc(m.opponent)}${m.format?" · "+esc(m.format):""}</span></div><button class="btn danger sm" onclick="liveDiscard()">Discard</button></div>`+xiPickerHTML();
    return;
  }

  if(LIVE.phase==="batting"){
    const b=LIVE.bat;
    if(!b.striker||!b.nonStriker){
      v.innerHTML=toolbar+`<div class="lv-panel"><h4>Opening batsmen</h4>
        <div class="form-grid"><div class="field"><label>Striker</label>${batSelect("lv-striker",[])}</div>
        <div class="field"><label>Non-striker</label>${batSelect("lv-nonstriker",[])}</div></div>
        <button class="btn primary" style="margin-top:12px" onclick="liveSetOpeners()">Start batting</button></div>`;
      return;
    }
    const s=b.players[b.striker], ns=b.players[b.nonStriker];
    const sR=R(s), nsR=R(ns);
    const sSR=s.balls?(sR/s.balls*100).toFixed(0):"0", nsSR=ns.balls?(nsR/ns.balls*100).toFixed(0):"0";
    const rr=b.legalBalls?(b.total/(b.legalBalls/6)).toFixed(2):"0.00";
    const ballsLeft=m.oversLimit?Math.max(0,m.oversLimit*6-b.legalBalls):null;
    const board=`<div class="lv-board">
      <div class="lv-board-top"><div class="lv-team">Gold Hayat — batting</div><div class="lv-badge">${esc(m.format||"")} · ${oversStr(b.legalBalls)}${m.oversLimit?" / "+m.oversLimit:""} ov</div></div>
      <div class="lv-score">${b.total}<span class="w">/${b.wickets}</span><span class="ov">(${oversStr(b.legalBalls)})</span></div>
      <div class="lv-meta"><span class="chipm">CRR <b>${rr}</b></span>${ballsLeft!=null?`<span class="chipm">${ballsLeft} balls left</span>`:""}<span class="chipm">vs ${esc(m.opponent)}</span></div>
      <div class="lv-strike">
        <div class="lv-batcard on"><div class="nm">▶ on strike · ${esc(b.striker)}</div><div class="rn">${sR}<small> (${s.balls})</small></div><div class="sr">SR ${sSR} · ${s.fours}×4 ${s.sixes}×6</div></div>
        <div class="lv-batcard"><div class="nm">${esc(b.nonStriker)}</div><div class="rn">${nsR}<small> (${ns.balls})</small></div><div class="sr">SR ${nsSR}</div></div>
      </div>
      <div style="text-align:right;margin-top:10px"><button class="btn ghost sm" onclick="liveSwapStrike()">⇄ Swap strike</button></div>
      ${recentChips(b.recent)}
    </div>`;
    let panel="";
    if(b.needNew){ panel=`<div class="lv-panel"><h4>Wicket! Next batsman in</h4>${batSelect("lv-newbat",b.order)}
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary" onclick="liveNewBatsman()">Send in</button><button class="btn ghost" onclick="liveAddSubPrompt()">＋ Add player</button></div></div>`; }
    else if(b.pendingWicket){ panel=`<div class="lv-panel"><h4>How was ${esc(b.striker)} out?</h4>
      <div class="lv-types">${["bowled","caught","runout","stumped","hitwicket"].map(t=>`<button class="t" onclick="onLiveWicket('${t}')">${t==="runout"?"run out":t==="hitwicket"?"hit wicket":t}</button>`).join("")}</div>
      <button class="btn ghost sm" style="margin-top:12px" onclick="onLiveWicketCancel()">Cancel</button></div>`; }
    else if(b.pendingExtra){ const kn=b.pendingExtra==="wd"?"Wide":"No ball"; panel=`<div class="lv-panel"><h4>${kn} — total runs on this ball?</h4>
      <div class="lv-types">${[1,2,3,4,5].map(n=>`<button class="t" onclick="onLiveExtraRuns(${n})">${n===1?"1 (just "+kn.toLowerCase()+")":n}</button>`).join("")}</div>
      <button class="btn ghost sm" style="margin-top:12px" onclick="onLiveExtraCancel()">Cancel</button></div>`; }
    v.innerHTML=toolbar+board+((b.needNew||b.pendingWicket||b.pendingExtra)?panel:pad());
    return;
  }

  const w=LIVE.bowl;
  if(w.needNew||!w.currentBowler){
    v.innerHTML=toolbar+`<div class="lv-board">
      <div class="lv-board-top"><div class="lv-team">${esc(m.opponent)} — batting</div><div class="lv-badge">${esc(m.format||"")} · ${oversStr(w.legalBalls)}${m.oversLimit?" / "+m.oversLimit:""} ov</div></div>
      <div class="lv-score">${w.oppTotal}<span class="w">/${w.oppWkts}</span><span class="ov">(${oversStr(w.legalBalls)})</span></div>
      <div class="lv-meta"><span class="chipm">Our bowling</span></div>${recentChips(w.recent)}</div>
      <div class="lv-panel"><h4>${w.legalBalls?"Next over — choose bowler":"Opening bowler"}</h4>${batSelect("lv-bowler",[])}
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary" onclick="liveSetBowler()">Start over</button><button class="btn ghost" onclick="liveAddSubPrompt()">＋ Add player</button></div></div>`;
    return;
  }
  const bw=w.bowlers[w.currentBowler];
  const econ=bw.balls?(bw.runs/(bw.balls/6)).toFixed(2):"0.00";
  const rr=w.legalBalls?(w.oppTotal/(w.legalBalls/6)).toFixed(2):"0.00";
  const board=`<div class="lv-board">
    <div class="lv-board-top"><div class="lv-team">${esc(m.opponent)} — batting</div><div class="lv-badge">${esc(m.format||"")} · ${oversStr(w.legalBalls)}${m.oversLimit?" / "+m.oversLimit:""} ov</div></div>
    <div class="lv-score">${w.oppTotal}<span class="w">/${w.oppWkts}</span><span class="ov">(${oversStr(w.legalBalls)})</span></div>
    <div class="lv-meta"><span class="chipm">Our bowling</span><span class="chipm">RR <b>${rr}</b></span></div>
    <div class="lv-strike">
      <div class="lv-batcard on"><div class="nm">● bowling · ${esc(w.currentBowler)}</div><div class="rn">${bw.wickets}<small>/${bw.runs}</small></div><div class="sr">${oversStr(bw.balls)} ov · econ ${econ}</div></div>
      <div class="lv-batcard"><div class="nm">This spell</div><div class="rn">${bw.dots}<small> dots</small></div><div class="sr">${bw.wides} wd · ${bw.noballs} nb</div></div>
    </div>
    ${recentChips(w.recent)}
  </div>`;
  let panel="";
  if(w.pendingWicket){ panel=`<div class="lv-panel"><h4>Wicket! Credit our fielder (for catch / run-out / stumping)</h4>
    <div class="field" style="margin-bottom:10px"><label>Fielder</label>${batSelect("lv-fielder",[])}</div>
    <div class="lv-types">${["bowled","caught","runout","stumped"].map(t=>`<button class="t" onclick="onLiveWicket('${t}')">${t==="runout"?"run out":t}</button>`).join("")}</div>
    <button class="btn ghost sm" style="margin-top:12px" onclick="onLiveWicketCancel()">Cancel</button></div>`; }
  else if(w.pendingExtra){ const kn=w.pendingExtra==="wd"?"Wide":"No ball"; panel=`<div class="lv-panel"><h4>${kn} — total runs on this ball?</h4>
    <div class="lv-types">${[1,2,3,4,5].map(n=>`<button class="t" onclick="onLiveExtraRuns(${n})">${n===1?"1 (just "+kn.toLowerCase()+")":n}</button>`).join("")}</div>
    <button class="btn ghost sm" style="margin-top:12px" onclick="onLiveExtraCancel()">Cancel</button></div>`; }
  v.innerHTML=toolbar+board+((w.pendingWicket||w.pendingExtra)?panel:pad());
}

</script>
</body>
</html>
