<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gold Hayat Cricket Team — Stats Hub</title>
<meta name="description" content="Official batting, bowling, fielding and captaincy records for the Gold Hayat Cricket Team." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090d0b;--bg-2:#0c110e;--surface:#111a15;--surface-2:#16211b;
  --line:rgba(232,184,75,.14);--line-soft:rgba(255,255,255,.06);
  --gold:#e8b84b;--gold-2:#c8952e;--gold-soft:rgba(232,184,75,.10);
  --ball:#c8362b;--pitch:#3fa66a;--sky:#4a90d9;
  --cream:#efe9da;--text:#dfe4de;--muted:#8b968e;--muted-2:#6a746c;
  --radius:14px;--radius-sm:10px;--shadow:0 18px 50px -20px rgba(0,0,0,.7);
  --mono:"Oswald",system-ui,sans-serif;--body:"Inter",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:radial-gradient(1200px 600px at 80% -10%,rgba(232,184,75,.07),transparent 60%),radial-gradient(900px 500px at -10% 10%,rgba(63,166,106,.05),transparent 55%),var(--bg);color:var(--text);font-family:var(--body);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
.tnum{font-variant-numeric:tabular-nums}
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:linear-gradient(180deg,var(--bg-2),var(--bg));border-right:1px solid var(--line-soft);padding:22px 16px;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:12px;padding:6px 8px 18px}
.crest{width:44px;height:44px;border-radius:12px;flex:none;background:linear-gradient(145deg,var(--gold),var(--gold-2));display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:20px;color:#1a1206;box-shadow:0 8px 20px -6px rgba(232,184,75,.5);letter-spacing:.5px}
.brand h1{font-family:var(--mono);font-weight:600;font-size:16px;margin:0;letter-spacing:.4px;color:var(--cream);line-height:1.1}
.brand span{font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.nav-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2);padding:14px 10px 6px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;color:var(--muted);font-size:14px;font-weight:500;transition:.15s}
.nav a .ic{width:18px;height:18px;flex:none;opacity:.8}
.nav a:hover{color:var(--cream);background:rgba(255,255,255,.03)}
.nav a.active{color:#1a1206;background:linear-gradient(135deg,var(--gold),var(--gold-2));font-weight:600}
.nav a.active .ic{opacity:1}
.sidebar-foot{margin-top:auto;padding:14px 10px 4px;font-size:11px;color:var(--muted-2);line-height:1.5}
.main{padding:34px 40px 80px;max-width:1240px;width:100%}
.topbar{display:none}
.dirty{background:linear-gradient(90deg,rgba(232,184,75,.16),rgba(232,184,75,.06));border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.dirty .txt{font-size:13px;color:var(--cream)}
.dirty .txt b{color:var(--gold)}
.scoreboard{background:linear-gradient(180deg,rgba(232,184,75,.05),transparent 40%),var(--surface);border:1px solid var(--line);border-radius:18px;padding:26px 28px;margin-bottom:26px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.scoreboard::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(90deg,rgba(255,255,255,.015) 0 1px,transparent 1px 3px);opacity:.5}
.sb-top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;position:relative}
.sb-eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600}
.sb-title{font-family:var(--mono);font-weight:600;font-size:34px;color:var(--cream);margin:6px 0 0;letter-spacing:.5px;line-height:1}
.sb-sub{color:var(--muted);font-size:13px;margin-top:6px}
.sb-stats{display:flex;gap:30px;flex-wrap:wrap}
.sb-stat{text-align:right}
.sb-stat .n{font-family:var(--mono);font-size:30px;font-weight:600;color:var(--cream);line-height:1}
.sb-stat .l{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:5px}
.sb-stat.win .n{color:var(--pitch)}
.sb-stat.loss .n{color:var(--ball)}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.page-head h2{font-family:var(--mono);font-weight:600;font-size:26px;color:var(--cream);margin:0;letter-spacing:.4px}
.page-head p{color:var(--muted);font-size:13px;margin:4px 0 0}
.eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:8px}
.grid{display:grid;gap:16px}
.grid.c4{grid-template-columns:repeat(4,1fr)}
.grid.c3{grid-template-columns:repeat(3,1fr)}
.grid.c2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);padding:18px 20px}
.card.gold{border-color:var(--line)}
.stat-card{display:flex;flex-direction:column;gap:2px}
.stat-card .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.stat-card .v{font-family:var(--mono);font-size:30px;font-weight:600;color:var(--cream);line-height:1.15}
.stat-card .v small{font-size:14px;color:var(--muted);font-weight:400}
.stat-card .sub{font-size:12px;color:var(--muted-2)}
.table-wrap{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);overflow:hidden}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{text-align:right;padding:13px 12px;font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line-soft);white-space:nowrap;background:var(--bg-2);position:sticky;top:0}
thead th.sortable{cursor:pointer;user-select:none;transition:color .15s}
thead th.sortable:hover{color:var(--gold)}
thead th .arr{color:var(--gold);margin-left:3px}
th.l,td.l{text-align:left}
tbody td{padding:12px;border-bottom:1px solid rgba(255,255,255,.03);text-align:right;white-space:nowrap;color:var(--text)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(232,184,75,.03)}
tbody tr.clickable{cursor:pointer}
.rank{color:var(--muted-2);font-family:var(--mono);width:34px}
.rank.top{color:var(--gold)}
.pname{font-weight:600;color:var(--cream)}
.pname:hover{color:var(--gold)}
.hi{color:var(--gold);font-weight:600}
.dim{color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em}
.badge.win{background:rgba(63,166,106,.14);color:var(--pitch)}
.badge.loss{background:rgba(200,54,43,.14);color:#e37a70}
.badge.tie{background:rgba(232,184,75,.14);color:var(--gold)}
.badge.nr{background:rgba(255,255,255,.06);color:var(--muted)}
.chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:var(--gold-soft);color:var(--gold);font-weight:600}
.chip.red{background:rgba(200,54,43,.13);color:#e37a70}
.chip.cap{background:rgba(74,144,217,.15);color:#8fbce8}
.star{color:var(--gold)}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
input,select{background:var(--bg-2);border:1px solid var(--line-soft);color:var(--text);padding:9px 11px;border-radius:9px;font-size:13.5px;outline:none;transition:.15s}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,184,75,.12)}
select{cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:10px;border:1px solid var(--line);background:transparent;color:var(--cream);font-weight:600;font-size:13.5px;transition:.15s}
.btn:hover{background:var(--gold-soft);border-color:var(--gold)}
.btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#1a1206;border:none}
.btn.primary:hover{filter:brightness(1.06)}
.btn.ghost{border-color:var(--line-soft);color:var(--muted)}
.btn.ghost:hover{color:var(--cream);border-color:var(--line)}
.btn.danger{border-color:rgba(200,54,43,.3);color:#e37a70}
.btn.danger:hover{background:rgba(200,54,43,.1)}
.btn.sm{padding:6px 11px;font-size:12px}
.match-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:16px;align-items:center;padding:15px 20px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:.15s}
.match-row:last-child{border-bottom:none}
.match-row:hover{background:rgba(232,184,75,.03)}
.match-date{font-family:var(--mono);font-size:13px;color:var(--muted);width:88px}
.match-vs .opp{font-weight:600;color:var(--cream);font-size:15px}
.match-vs .meta{font-size:12px;color:var(--muted-2);margin-top:2px}
.match-score{font-family:var(--mono);font-size:17px;color:var(--cream);text-align:right}
.match-score .opp-score{color:var(--muted);font-size:13px}
.sc-section-title{font-family:var(--mono);font-size:15px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin:26px 0 12px;display:flex;align-items:center;gap:10px}
.sc-section-title::after{content:"";flex:1;height:1px;background:var(--line-soft)}
.dismissal{color:var(--muted);font-size:12.5px}
.profile-head{display:flex;align-items:center;gap:18px;margin-bottom:8px}
.avatar{width:66px;height:66px;border-radius:16px;flex:none;background:linear-gradient(145deg,var(--surface-2),var(--surface));border:1px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:26px;font-weight:600;color:var(--gold)}
.profile-head h2{font-family:var(--mono);font-size:30px;color:var(--cream);margin:0;letter-spacing:.4px}
.profile-head .role{color:var(--muted);font-size:13px}
.spark{display:block;width:100%;height:120px}
.bar{fill:var(--gold-2);transition:.2s}
.bar:hover{fill:var(--gold)}
.chart-card{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);padding:18px 20px}
.donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.legend{display:flex;flex-direction:column;gap:9px;font-size:13px;min-width:150px}
.legend .li{display:flex;align-items:center;gap:9px;color:var(--text)}
.legend .dot{width:11px;height:11px;border-radius:3px;flex:none}
.legend .val{margin-left:auto;font-family:var(--mono);color:var(--cream)}
.barsH{display:flex;flex-direction:column;gap:11px}
.barH{display:grid;grid-template-columns:130px 1fr 92px;align-items:center;gap:12px;font-size:13px}
.barH .lab{color:var(--cream);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.barH .lab:hover{color:var(--gold)}
.barH .track{height:14px;background:var(--bg-2);border-radius:8px;overflow:hidden;border:1px solid var(--line-soft)}
.barH .fill{height:100%;background:linear-gradient(90deg,var(--gold-2),var(--gold));border-radius:8px;transition:width .4s}
.barH .v{font-family:var(--mono);color:var(--cream);text-align:right;font-size:12.5px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .em-ic{font-size:34px;margin-bottom:10px;opacity:.5}
.notice{background:var(--gold-soft);border:1px solid var(--line);border-radius:12px;padding:14px 18px;font-size:13px;color:var(--cream);margin-bottom:18px}
.notice b{color:var(--gold)}
.form-section{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);padding:22px;margin-bottom:18px}
.form-section h3{font-family:var(--mono);font-size:15px;letter-spacing:.05em;text-transform:uppercase;color:var(--cream);margin:0 0 16px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.entry-table{width:100%;border-collapse:collapse;font-size:13px}
.entry-table th{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:6px;text-align:center;font-family:var(--mono);font-weight:500}
.entry-table th.l{text-align:left}
.entry-table td{padding:4px}
.entry-table input,.entry-table select{width:100%;padding:7px 8px;text-align:center;font-size:13px}
.entry-table input.name,.entry-table select{text-align:left}
.entry-table .num{width:58px}
.calc{font-family:var(--mono);color:var(--gold);font-size:13px;text-align:center;white-space:nowrap}
.row-del{background:none;border:none;color:var(--muted-2);font-size:16px;padding:2px 6px}
.row-del:hover{color:var(--ball)}
.total-line{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line-soft);font-family:var(--mono);color:var(--cream);font-size:14px}
.total-line .diff{color:var(--gold)}
textarea{width:100%;min-height:220px;background:var(--bg-2);border:1px solid var(--line-soft);color:var(--text);border-radius:10px;padding:14px;font-family:ui-monospace,monospace;font-size:12.5px;resize:vertical}
.hr{height:1px;background:var(--line-soft);margin:22px 0}
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:40;padding:14px 18px;background:rgba(9,13,11,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line-soft)}
  .topbar .brand{padding:0}
  .topbar .crest{width:36px;height:36px;font-size:16px}
  .topbar h1{font-size:14px}
  .menu-btn{background:none;border:1px solid var(--line-soft);border-radius:9px;color:var(--cream);padding:8px 10px;font-size:18px;line-height:1}
  .drawer{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);display:none}
  .drawer.open{display:block}
  .drawer .panel{position:absolute;top:0;left:0;bottom:0;width:250px;background:var(--bg-2);border-right:1px solid var(--line);padding:20px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
  .main{padding:20px 16px 70px}
  .sb-title{font-size:26px}
  .sb-stat .n{font-size:24px}
  .grid.c4{grid-template-columns:repeat(2,1fr)}
  .grid.c3{grid-template-columns:1fr}
  .grid.c2{grid-template-columns:1fr}
  .match-row{grid-template-columns:1fr auto;row-gap:6px}
  .match-date{width:auto;grid-column:1/-1}
  .barH{grid-template-columns:96px 1fr 78px}
}
@media(min-width:901px){.drawer{display:none!important}}
/* Tablets / large phones (portrait): use two columns instead of one where it helps */
@media(min-width:600px) and (max-width:900px){
  .grid.c3{grid-template-columns:repeat(2,1fr)}
  .grid.c2{grid-template-columns:repeat(2,1fr)}
  .main{padding:22px 22px 76px}
}
/* Touch devices: stop iOS auto-zoom on input focus, enlarge tap targets */
@media(max-width:900px){
  input,select,textarea{font-size:16px}
  .entry-table input,.entry-table select{font-size:15px}
  .swatch{width:24px;height:24px}
  .main{max-width:100%}
  .btn.sm{padding:8px 12px}
}
/* Small phones */
@media(max-width:430px){
  .main{padding:16px 12px 64px}
  .scoreboard{padding:20px 17px}
  .sb-title{font-size:21px}
  .sb-eyebrow{font-size:10px}
  .sb-stats{gap:16px}
  .sb-stat .n{font-size:20px}
  .grid.c4{grid-template-columns:repeat(2,1fr);gap:12px}
  .card{padding:15px 15px}
  .stat-card .v{font-size:24px}
  .page-head h2{font-size:22px}
  .profile-head h2{font-size:24px}
  .avatar{width:56px;height:56px;font-size:22px}
  .controls{gap:8px}
  .controls .field{flex:1;min-width:calc(50% - 4px)}
  .controls select,.controls input{width:100%}
  .donut-wrap{gap:16px;justify-content:center}
  .legend{min-width:130px}
}

/* ---- Profile format tabs ---- */
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 22px}
.tab{padding:8px 16px;border-radius:22px;border:1px solid var(--line-soft);background:var(--surface);color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
.tab:hover{color:var(--cream);border-color:var(--line)}
.tab.on{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#1a1206;border-color:transparent}
.split-title{font-family:var(--mono);font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin:26px 0 14px;display:flex;align-items:center;gap:10px}
.split-title .pill{font-family:var(--body);font-size:11px;letter-spacing:.02em;text-transform:none;color:var(--muted);background:var(--gold-soft);padding:2px 9px;border-radius:20px}
.split-title::after{content:"";flex:1;height:1px;background:var(--line-soft)}
.minitabs{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.minitab{padding:5px 12px;border-radius:16px;border:1px solid var(--line-soft);background:var(--surface-2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer}
.minitab:hover{color:var(--cream)}
.minitab.on{background:var(--gold-soft);color:var(--gold);border-color:var(--line)}
.minitabs select{padding:5px 9px;font-size:12px;margin-left:2px}
/* ---- Live scoring (LED scoreboard) ---- */
.lv-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.lv-live-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--ball);margin-right:8px;box-shadow:0 0 10px var(--ball);animation:lvpulse 1.3s infinite}
@keyframes lvpulse{0%,100%{opacity:1}50%{opacity:.3}}
.lv-tag{font-family:var(--mono);font-weight:600;letter-spacing:.06em;color:var(--cream);text-transform:uppercase;font-size:13px}
.lv-tag .dim{color:var(--muted);font-weight:400;letter-spacing:0;text-transform:none}
.lv-board{position:relative;overflow:hidden;border-radius:20px;padding:24px 26px;margin-bottom:18px;
  background:radial-gradient(120% 140% at 85% -20%,rgba(232,184,75,.10),transparent 55%),linear-gradient(180deg,#0f1a14,#0a120d);
  border:1px solid var(--line);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.04)}
.lv-board::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.022) 0 1px,transparent 1px 4px);opacity:.6}
.lv-board::after{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
.lv-board-top{display:flex;justify-content:space-between;align-items:center;gap:12px;position:relative}
.lv-team{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--cream);letter-spacing:.04em}
.lv-badge{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);background:var(--gold-soft);border:1px solid var(--line);padding:5px 11px;border-radius:20px}
.lv-score{position:relative;font-family:var(--mono);font-weight:700;font-size:60px;line-height:1;color:var(--cream);margin-top:12px;text-shadow:0 0 26px rgba(232,184,75,.18)}
.lv-score .w{color:var(--muted);font-size:30px}
.lv-score .ov{font-size:20px;color:var(--muted);margin-left:12px;font-weight:500}
.lv-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;position:relative}
.chipm{font-family:var(--mono);font-size:12px;color:var(--cream);background:var(--bg-2);border:1px solid var(--line-soft);border-radius:8px;padding:5px 10px;letter-spacing:.02em}
.chipm b{color:var(--gold)}
.lv-strike{font-size:0;margin:16px -6px 0;position:relative}
.lv-batcard{display:inline-block;box-sizing:border-box;vertical-align:top;width:calc(50% - 12px);margin:0 6px;background:rgba(255,255,255,.02);border:1px solid var(--line-soft);border-left:3px solid transparent;border-radius:12px;padding:12px 14px}
.lv-batcard.on{border-left-color:var(--gold);background:rgba(232,184,75,.06)}
.lv-batcard .nm{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}
.lv-batcard.on .nm{color:var(--gold);font-weight:600}
.lv-batcard .rn{font-family:var(--mono);font-size:26px;color:var(--cream);margin-top:3px}
.lv-batcard .rn small{font-size:14px;color:var(--muted)}
.lv-batcard .sr{font-size:11px;color:var(--muted-2);margin-top:2px}
.lv-timeline{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:16px;position:relative}
.lv-timeline .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2);margin-right:4px}
.lv-bead{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-family:var(--mono);font-size:13px;font-weight:600;background:var(--bg-2);color:var(--text);border:1px solid var(--line-soft)}
.lv-bead.bd{background:transparent;border-style:dashed;color:var(--muted-2)}
.lv-bead.b4{color:var(--gold);border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
.lv-bead.b6{color:#1a1206;background:linear-gradient(135deg,var(--gold),var(--gold-2));border-color:transparent}
.lv-bead.bw{background:rgba(200,54,43,.22);color:#ef8378;border-color:rgba(200,54,43,.5)}
.lv-bead.bx{color:var(--sky);border-color:rgba(74,144,217,.5);background:rgba(74,144,217,.08)}
/* keypad console */
.lv-keypad{background:linear-gradient(180deg,var(--surface),var(--bg-2));border:1px solid var(--line-soft);border-radius:18px;padding:14px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.lv-keys-runs,.lv-keys-act{font-size:0;margin:0 -5px}
.lv-keys-act{margin-top:6px}
.lv-key{display:inline-block;box-sizing:border-box;vertical-align:top;text-align:center;margin:5px;width:calc(16.666% - 10px);min-height:74px;padding:14px 4px;border-radius:14px;
  background:linear-gradient(180deg,var(--surface-2),#0c140f);border:1px solid var(--line-soft);color:var(--cream);cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 2px 6px -3px rgba(0,0,0,.6);transition:transform .1s,border-color .12s,box-shadow .12s}
.lv-key:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 20px -12px rgba(232,184,75,.5)}
.lv-key:active{transform:translateY(0)}
.lv-key .k-n{display:block;font-family:var(--mono);font-size:24px;font-weight:700;line-height:1.05}
.lv-key .k-l{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:5px}
.lv-key.four .k-n,.lv-key.six .k-n{color:var(--gold)}
.lv-key.four,.lv-key.six{border-color:rgba(232,184,75,.35)}
.lv-key.act{width:calc(25% - 10px);min-height:0;padding:17px 6px;font-family:var(--mono);font-size:15px;font-weight:600}
.lv-key.ext{color:var(--sky)}
.lv-key.wkt{color:#ef8378;background:linear-gradient(180deg,rgba(200,54,43,.18),rgba(200,54,43,.06));border-color:rgba(200,54,43,.4)}
.lv-key.wkt:hover{border-color:var(--ball);box-shadow:0 10px 20px -12px rgba(200,54,43,.6)}
.lv-key.undo{color:var(--muted)}
.lv-panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:14px}
.lv-panel h4{margin:0 0 12px;font-family:var(--mono);font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:var(--gold)}
.lv-types{display:flex;gap:8px;flex-wrap:wrap}
.lv-types .t{padding:10px 15px;border-radius:10px;border:1px solid var(--line-soft);background:var(--surface-2);color:var(--cream);font-size:13px;font-weight:600;cursor:pointer;transition:.12s}
.lv-types .t:hover{border-color:var(--gold);transform:translateY(-1px)}
.xi-chips{display:flex;flex-wrap:wrap;gap:8px}
.xi-chip{padding:9px 15px;border-radius:22px;border:1px solid var(--line-soft);background:var(--surface-2);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:.12s}
.xi-chip:hover{color:var(--cream);border-color:var(--line)}
.xi-chip.on{background:var(--gold-soft);color:var(--gold);border-color:var(--gold)}
.xi-chip.on::before{content:"✓ ";font-weight:700}
.autotag{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);background:var(--gold-soft);padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle;font-weight:700}
.form-grid input[readonly]{background:var(--bg-2);color:var(--gold);font-family:var(--mono);border-style:dashed;cursor:not-allowed}
@media(max-width:900px){
  .lv-score{font-size:46px}.lv-score .w{font-size:24px}
  .lv-keys-runs .lv-key{width:calc(33.333% - 10px)}
  .lv-key.act{width:calc(50% - 10px)}
}
/* ---- Logo crest ---- */
.crest{overflow:hidden}
.crest.has-img{background:transparent;box-shadow:0 8px 20px -8px rgba(0,0,0,.55);border:1px solid var(--line)}
.crest img{width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block}
/* ---- Theme switcher ---- */
.theme-row{display:flex;align-items:center;gap:10px;margin:16px 0 6px;flex-wrap:wrap}
.theme-row>span{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2)}
.theme-switch{display:flex;gap:8px}
.swatch{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;box-shadow:0 0 0 1px var(--line-soft)}
.swatch:hover{transform:scale(1.12)}
.swatch.on{border-color:var(--gold);box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--gold)}
/* ================= THEMES ================= */
html[data-theme="light"]{
  --bg:#f3efe6;--bg-2:#e9e3d5;--surface:#fffdf8;--surface-2:#f4efe4;
  --line:rgba(176,125,22,.30);--line-soft:rgba(20,20,20,.10);
  --gold:#b07d16;--gold-2:#916312;--gold-soft:rgba(176,125,22,.13);
  --ball:#c0392b;--pitch:#1e8a54;--sky:#2f6fb0;
  --cream:#16201a;--text:#2b332c;--muted:#69726d;--muted-2:#9aa39b;
  --shadow:0 18px 46px -24px rgba(0,0,0,.28);
}
html[data-theme="light"] body{background:radial-gradient(1200px 600px at 80% -10%,rgba(176,125,22,.10),transparent 60%),radial-gradient(900px 500px at -10% 10%,rgba(30,138,84,.07),transparent 55%),var(--bg)}
html[data-theme="emerald"]{
  --bg:#05130d;--bg-2:#081a12;--surface:#0b2117;--surface-2:#0f2b1e;
  --line:rgba(62,224,160,.22);--line-soft:rgba(255,255,255,.06);
  --gold:#3ee0a0;--gold-2:#1fa877;--gold-soft:rgba(62,224,160,.12);
  --ball:#e3675a;--pitch:#3fd08a;--sky:#4a90d9;
  --cream:#eafff5;--text:#cfe9dd;--muted:#7fa393;--muted-2:#5f8073;
}
html[data-theme="royal"]{
  --bg:#080d1c;--bg-2:#0b1226;--surface:#101a33;--surface-2:#152241;
  --line:rgba(120,160,240,.24);--line-soft:rgba(255,255,255,.06);
  --gold:#f0c94b;--gold-2:#c99b2e;--gold-soft:rgba(240,201,75,.12);
  --ball:#e3675a;--pitch:#3fbf7f;--sky:#6aa0f0;
  --cream:#eef3ff;--text:#d3dcf0;--muted:#8892b4;--muted-2:#5f6a8f;
}
html[data-theme="maroon"]{
  --bg:#170709;--bg-2:#210b0e;--surface:#2a1013;--surface-2:#351417;
  --line:rgba(240,192,90,.22);--line-soft:rgba(255,255,255,.06);
  --gold:#f0c05a;--gold-2:#c98f37;--gold-soft:rgba(240,192,90,.12);
  --ball:#ff6f61;--pitch:#57c98a;--sky:#5a8de0;
  --cream:#fdeee0;--text:#ecd7cf;--muted:#b78f89;--muted-2:#8a6560;
}
</style>

/* ---------- State + persistence ---------- */
let DATA = null;
const LS_KEY = "goldhayat_data_v2";
const LS_DIRTY = "goldhayat_dirty";

function normalize(d){
  if(!d||typeof d!=="object") d={};
  if(!d.team||typeof d.team!=="object") d.team={name:TEAM_NAME};
  if(!d.team.name) d.team.name=TEAM_NAME;
  if(!Array.isArray(d.team.players)) d.team.players=[];
  if(!Array.isArray(d.matches)) d.matches=[];
  if(!Array.isArray(d.fixtures)) d.fixtures=[];
  if(!d.config||typeof d.config!=="object") d.config={};
  return d;
}
/* ---------- Edit lock (view-only for others) ---------- */
let EDIT_UNLOCKED=false;
async function sha256hex(str){ const buf=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(String(str))); return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join(""); }
function editHashSet(){ return !!(DATA&&DATA.config&&DATA.config.editHash); }
function canEdit(){ return !editHashSet() || EDIT_UNLOCKED; }
function applyRemoteConfig(rc){ if(!rc)return; DATA.config=DATA.config||{}; if(rc.editHash){ DATA.config.editHash=rc.editHash; } else { delete DATA.config.editHash; } }
async function loadData(){
  const local = localStorage.getItem(LS_KEY);
  if(local){ try{ const j=JSON.parse(local); if(j&&j.matches) return normalize(j); }catch(e){} }
  try{ const res=await fetch("data.json",{cache:"no-store"}); if(res.ok){ const j=await res.json(); if(j&&j.matches) return normalize(j); } }catch(e){}
  return normalize(JSON.parse(JSON.stringify(SAMPLE_DATA)));
}
function saveLocal(){ localStorage.setItem(LS_KEY, JSON.stringify(DATA)); }
function setDirty(v){ if(v) localStorage.setItem(LS_DIRTY,"1"); else localStorage.removeItem(LS_DIRTY); updateBanner(); }
function isDirty(){ return localStorage.getItem(LS_DIRTY)==="1"; }

/* ---------- Helpers ---------- */
const $ = (s,el=document)=>el.querySelector(s);
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const int = v => { const n=parseInt(v,10); return isNaN(n)?0:n; };
function oversToBalls(o){ const s=String(o||"0").trim(); const p=s.split("."); const ov=int(p[0]); const b=p[1]?int(p[1].charAt(0)):0; return ov*6+Math.min(b,5); }
function ballsToOvers(b){ b=Math.round(b); return Math.floor(b/6)+"."+(b%6); }
function fmtDate(d){ if(!d) return ""; const dt=new Date(d+"T00:00"); if(isNaN(dt)) return d; return dt.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}); }
function fmtDateW(d){ if(!d) return ""; const dt=new Date(d+"T00:00"); if(isNaN(dt)) return d; return dt.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}); }
function initials(name){ return String(name||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
function inn(b){
  const dots=int(b.dots),o=int(b.ones),t=int(b.twos),th=int(b.threes),f=int(b.fours),s=int(b.sixes),fv=int(b.fives||0);
  const runs=o+2*t+3*th+4*f+6*s+5*fv; const balls=dots+o+t+th+f+s+fv;
  return {...b,runs,balls,dots,ones:o,twos:t,threes:th,fours:f,sixes:s,fives:fv,out:b.dismissal!=="notout"};
}
const DISMISSALS=["caught","bowled","lbw","runout","stumped","hitwicket","notout","retired"];
function dismissalText(b){
  const d=b.dismissal;
  if(d==="notout")return "not out";
  if(d==="runout")return "run out"+(b.fielder?" ("+esc(b.fielder)+")":"");
  if(d==="caught")return "c "+(b.fielder?esc(b.fielder):"—")+(b.bowler?" b "+esc(b.bowler):"");
  if(d==="bowled")return "b "+(b.bowler?esc(b.bowler):"—");
  if(d==="lbw")return "lbw"+(b.bowler?" b "+esc(b.bowler):"");
  if(d==="stumped")return "st "+(b.fielder?esc(b.fielder):"—")+(b.bowler?" b "+esc(b.bowler):"");
  if(d==="hitwicket")return "hit wicket";
  if(d==="retired")return "retired";
  return esc(d||"");
}

/* ---------- Filtering (opponent + period + captain) ---------- */
function inPeriod(date,period){
  if(!period||period==="all")return true;
  if(!date)return false;
  const now=new Date();
  if(period==="month")return (new Date(date+"T00:00")).getFullYear()===now.getFullYear() && (new Date(date+"T00:00")).getMonth()===now.getMonth();
  if(period==="year")return date.slice(0,4)===String(now.getFullYear());
  if(/^\d{4}-\d{2}$/.test(period))return date.slice(0,7)===period;
  if(/^\d{4}$/.test(period))return date.slice(0,4)===period;
  return true;
}
function getMatches(opts={}){
  const {opp="all",period="all",captain=null}=opts;
  return DATA.matches.filter(m=>{
    if(opp&&opp!=="all"&&m.opponent!==opp)return false;
    if(captain&&(m.captain||"—")!==captain)return false;
    if(!inPeriod(m.date,period))return false;
    return true;
  });
}
function opponents(){ return [...new Set(DATA.matches.map(m=>m.opponent).filter(Boolean))].sort(); }
function venues(){ return [...new Set(DATA.matches.map(m=>m.ground).filter(Boolean))].sort(); }
function venueAgg(ms){ ms=ms||DATA.matches; const map={};
  ms.forEach(m=>{ const g=m.ground||"—"; const p=map[g]||(map[g]={venue:g,played:0,w:0,l:0,t:0,nr:0});
    p.played++; if(m.result==="won")p.w++; else if(m.result==="lost")p.l++; else if(m.result==="tie")p.t++; else p.nr++; });
  return Object.values(map).map(p=>{const dec=p.w+p.l+p.t;p.winPct=dec?p.w/dec*100:0;return p;});
}
function oppVenueAgg(ms){ ms=ms||DATA.matches; const map={};
  ms.forEach(m=>{ const k=(m.opponent||"—")+" @@ "+(m.ground||"—"); const p=map[k]||(map[k]={opponent:m.opponent||"—",venue:m.ground||"—",played:0,w:0,l:0});
    p.played++; if(m.result==="won")p.w++; else if(m.result==="lost")p.l++; });
  return Object.values(map);
}
function captains(){ return [...new Set(DATA.matches.map(m=>m.captain).filter(Boolean))].sort(); }
function monthsPresent(){ return [...new Set(DATA.matches.map(m=>(m.date||"").slice(0,7)).filter(Boolean))].sort().reverse(); }

/* ---------- Aggregations ---------- */
function battingAgg(ms){
  ms=ms||DATA.matches; const map={};
  ms.forEach(m=>(m.batting||[]).forEach(raw=>{
    const b=inn(raw),k=b.name; if(!k)return;
    const p=map[k]||(map[k]={name:k,inns:0,no:0,runs:0,balls:0,fours:0,sixes:0,dots:0,ones:0,twos:0,threes:0,hs:0,hsNo:false,fifties:0,hundreds:0,ducks:0});
    p.inns++;p.runs+=b.runs;p.balls+=b.balls;p.fours+=b.fours;p.sixes+=b.sixes;p.dots+=b.dots;p.ones+=b.ones;p.twos+=b.twos;p.threes+=b.threes;
    if(!b.out)p.no++;
    if(b.runs>p.hs){p.hs=b.runs;p.hsNo=!b.out;}
    if(b.runs>=100)p.hundreds++;else if(b.runs>=50)p.fifties++;
    if(b.runs===0&&b.out)p.ducks++;
  }));
  return Object.values(map).map(p=>{
    const outs=p.inns-p.no;
    p.avg=outs>0?p.runs/outs:null;
    p.sr=p.balls>0?p.runs/p.balls*100:0;
    p.dotPct=p.balls>0?p.dots/p.balls*100:0;
    return p;
  });
}
function bowlingAgg(ms){
  ms=ms||DATA.matches; const map={};
  ms.forEach(m=>(m.bowling||[]).forEach(raw=>{
    const k=raw.name; if(!k)return; const balls=oversToBalls(raw.overs);
    const p=map[k]||(map[k]={name:k,inns:0,balls:0,runs:0,wkts:0,wides:0,noballs:0,dots:0,best:{w:-1,r:0},threeFer:0,fiveFer:0});
    p.inns++;p.balls+=balls;p.runs+=int(raw.runs);p.wkts+=int(raw.wickets);p.wides+=int(raw.wides);p.noballs+=int(raw.noballs);p.dots+=int(raw.dots);
    const w=int(raw.wickets),r=int(raw.runs);
    if(w>p.best.w||(w===p.best.w&&r<p.best.r))p.best={w,r};
    if(w>=5)p.fiveFer++;else if(w>=3)p.threeFer++;
  }));
  return Object.values(map).map(p=>{
    p.overs=ballsToOvers(p.balls);
    p.econ=p.balls>0?p.runs/(p.balls/6):0;
    p.avg=p.wkts>0?p.runs/p.wkts:null;
    p.sr=p.wkts>0?p.balls/p.wkts:null;
    p.bbi=p.best.w>=0?p.best.w+"/"+p.best.r:"—";
    return p;
  });
}

function teamSummary(ms){

/* ---------- SVG / HTML charts (self-contained) ---------- */
function donut(segs,size=160){
  const total=segs.reduce((a,s)=>a+s.value,0);
  if(total<=0) return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${size/2*0.8}" fill="none" stroke="var(--line-soft)" stroke-width="${size*0.18}"/></svg>`;
  const nonzero=segs.filter(s=>s.value>0);
  const r=size/2,ir=r*0.62,cx=r,cy=r; let ang=-Math.PI/2,paths="";
  if(nonzero.length===1){
    return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}"><circle cx="${cx}" cy="${cy}" r="${(r+ir)/2}" fill="none" stroke="${nonzero[0].color}" stroke-width="${r-ir}"/></svg>`;
  }
  segs.forEach(s=>{
    if(s.value<=0)return;
    const frac=s.value/total,a2=ang+frac*2*Math.PI,large=frac>0.5?1:0;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi2=cx+ir*Math.cos(a2),yi2=cy+ir*Math.sin(a2),xi1=cx+ir*Math.cos(ang),yi1=cy+ir*Math.sin(ang);
    paths+=`<path d="M${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} L${xi2} ${yi2} A${ir} ${ir} 0 ${large} 0 ${xi1} ${yi1} Z" fill="${s.color}"/>`;
    ang=a2;
  });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${paths}<text x="${cx}" y="${cy-4}" text-anchor="middle" fill="var(--cream)" font-family="var(--mono)" font-size="26" font-weight="600">${total}</text><text x="${cx}" y="${cy+15}" text-anchor="middle" fill="var(--muted)" font-size="10" letter-spacing="1">MATCHES</text></svg>`;
}
function legend(items){
  return `<div class="legend">${items.map(i=>`<div class="li"><span class="dot" style="background:${i.color}"></span>${esc(i.label)}<span class="val">${i.value}</span></div>`).join("")}</div>`;
}
function lineChart(pts,{w=580,h=150}={}){
  if(pts.length===0)return "";
  const pad=24, iw=w-pad*2, ih=h-pad*2;
  const max=Math.max(...pts.map(p=>p.v),1), min=Math.min(...pts.map(p=>p.v),0);
  const range=(max-min)||1;
  const X=i=>pad+(pts.length<=1?iw/2:i/(pts.length-1)*iw);
  const Y=v=>pad+ih-((v-min)/range)*ih;
  const line=pts.map((p,i)=>`${i?"L":"M"}${X(i).toFixed(1)} ${Y(p.v).toFixed(1)}`).join(" ");
  const area=line+` L${X(pts.length-1).toFixed(1)} ${(pad+ih).toFixed(1)} L${X(0).toFixed(1)} ${(pad+ih).toFixed(1)} Z`;
  const dots=pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="3.5" fill="var(--gold)"/><text x="${X(i).toFixed(1)}" y="${(Y(p.v)-9).toFixed(1)}" text-anchor="middle" fill="var(--muted)" font-size="10" font-family="var(--mono)">${p.v}</text>`).join("");
  const labs=pts.map((p,i)=>`<text x="${X(i).toFixed(1)}" y="${h-6}" text-anchor="middle" fill="var(--muted-2)" font-size="9">${esc(p.label||"")}</text>`).join("");
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" style="height:${h}px" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(232,184,75,.28)"/><stop offset="1" stop-color="rgba(232,184,75,0)"/></linearGradient></defs>
    <path d="${area}" fill="url(#ga)"/><path d="${line}" fill="none" stroke="var(--gold)" stroke-width="2"/>${dots}${labs}</svg>`;
}
function barsH(items){
  const max=Math.max(...items.map(i=>i.value),1);
  return `<div class="barsH">${items.map(i=>`<div class="barH">
    <div class="lab" ${i.href?`onclick="location.hash='${i.href}'"`:""}>${esc(i.label)}</div>
    <div class="track"><div class="fill" style="width:${Math.max(2,i.value/max*100)}%"></div></div>
    <div class="v">${i.display!=null?i.display:i.value}</div></div>`).join("")}</div>`;
}
function sparkBars(series){
  const max=Math.max(...series,1),w=Math.max(320,series.length*40),h=120,bw=Math.min(30,(w-20)/series.length-8);
  const bars=series.map((val,i)=>{const bh=Math.max(2,val/max*(h-28));const x=10+i*((w-20)/series.length);const y=h-bh-18;
    return `<rect class="bar" x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3"/><text x="${x+bw/2}" y="${y-4}" fill="var(--muted)" font-size="10" text-anchor="middle" font-family="var(--mono)">${val}</text>`;}).join("");
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${bars}</svg>`;
}
function monthLabel(ym){ const d=new Date(ym+"-01T00:00"); return isNaN(d)?ym:d.toLocaleDateString("en-GB",{month:"short",year:"2-digit"}); }
function monthBars(pts,{color="var(--gold)",h=160,suffix=""}={}){
  if(!pts||!pts.length) return `<div class="empty" style="padding:24px"><div class="em-ic">📊</div>No data yet for this view</div>`;
  const n=pts.length, w=Math.max(340, n*58), padB=30, padT=20, slot=w/n, bw=Math.min(38, slot-16);
  const max=Math.max(...pts.map(p=>p.v),1);
  const bars=pts.map((p,i)=>{
    const bh=Math.max(2, p.v/max*(h-padB-padT));
    const x=i*slot+(slot-bw)/2, y=h-padB-bh;
    const vlabel=p.v+(suffix?(" "+suffix):"");
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="4" fill="${color}"/>`+
      `<text x="${(x+bw/2).toFixed(1)}" y="${(y-6).toFixed(1)}" text-anchor="middle" fill="var(--cream)" font-size="11" font-family="var(--mono)">${vlabel}</text>`+
      `<text x="${(x+bw/2).toFixed(1)}" y="${h-9}" text-anchor="middle" fill="var(--muted)" font-size="10">${esc(p.label)}</text>`;
  }).join("");
  const base=`<line x1="0" y1="${h-padB}" x2="${w}" y2="${h-padB}" stroke="var(--line-soft)"/>`;
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" style="height:${h}px" preserveAspectRatio="xMidYMid meet">${base}${bars}</svg>`;
}

let playerFmt="all", playerFmtFor=null;
let playerBatMode="month", playerBowlMode="month", playerBatMonth="", playerBowlMonth="";
window.onPlayerFmt=(f)=>{ playerFmt=f; router(); };
window.onPCMode=(which,mode)=>{ if(which==="bat")playerBatMode=mode; else playerBowlMode=mode; router(); };
window.onPCMonth=(which,ym)=>{ if(which==="bat")playerBatMonth=ym; else playerBowlMonth=ym; router(); };
function dayLabel(d){ const dt=new Date(d+"T00:00"); return isNaN(dt)?d:dt.toLocaleDateString("en-GB",{day:"numeric",month:"short"}); }
function pcMonths(pmatches,name,isBowling){ const set=new Set(); pmatches.forEach(m=>{ const k=(m.date||"").slice(0,7); if(!k)return; const has=(isBowling?(m.bowling||[]):(m.batting||[])).some(x=>x.name===name); if(has)set.add(k); }); return [...set].sort(); }
function pcSeriesMonthly(pmatches,name,isBowling){ const mp={}; pmatches.forEach(m=>{ const k=(m.date||"").slice(0,7); if(!k)return; if(isBowling){(m.bowling||[]).forEach(x=>{ if(x.name===name)mp[k]=(mp[k]||0)+int(x.wickets); });} else {(m.batting||[]).map(inn).forEach(x=>{ if(x.name===name)mp[k]=(mp[k]||0)+x.runs; });} }); return Object.keys(mp).sort().map(k=>({label:monthLabel(k),v:mp[k]})); }
function pcSeriesSunday(pmatches,name,isBowling,ym){ const mp={}; pmatches.forEach(m=>{ const d=m.date||""; if(!d||(ym&&d.slice(0,7)!==ym))return; if(isBowling){(m.bowling||[]).forEach(x=>{ if(x.name===name)mp[d]=(mp[d]||0)+int(x.wickets); });} else {(m.batting||[]).map(inn).forEach(x=>{ if(x.name===name)mp[d]=(mp[d]||0)+x.runs; });} }); return Object.keys(mp).sort().map(k=>({label:dayLabel(k),v:mp[k]})); }
function playerChartBlock(which,pmatches,name){
  const isBowling=(which==="bowl");
  const mode=isBowling?playerBowlMode:playerBatMode;
  const months=pcMonths(pmatches,name,isBowling);
  let month=isBowling?playerBowlMonth:playerBatMonth;
  if(mode==="sunday" && (!month||!months.includes(month))) month=months[months.length-1]||"";
  const series=(mode==="month")?pcSeriesMonthly(pmatches,name,isBowling):pcSeriesSunday(pmatches,name,isBowling,month);
  const color=isBowling?"var(--ball)":"var(--gold)";
  const suffix=isBowling?"wkts":"";
  const title=isBowling?(mode==="month"?"Wickets by month":"Wickets by Sunday"):(mode==="month"?"Runs by month":"Runs by Sunday");
  const monthSel=(mode==="sunday"&&months.length)?`<select onchange="onPCMonth('${which}',this.value)">${months.map(ym=>`<option value="${ym}"${ym===month?" selected":""}>${monthLabel(ym)}</option>`).join("")}</select>`:"";
  return `<div class="chart-card"><div class="eyebrow" style="margin-bottom:10px">${title}</div>
    <div class="minitabs">
      <button class="minitab${mode==="month"?" on":""}" onclick="onPCMode('${which}','month')">Monthly</button>
      <button class="minitab${mode==="sunday"?" on":""}" onclick="onPCMode('${which}','sunday')">By Sunday</button>${monthSel}
    </div>${monthBars(series,{color,suffix})}</div>`;
}

function viewPlayer(v,name){
  if(playerFmtFor!==name){ playerFmt="all"; playerFmtFor=name; playerBatMode="month"; playerBowlMode="month"; playerBatMonth=""; playerBowlMonth=""; }
  const fmt=playerFmt;
  const pmatches=(fmt==="all"?DATA.matches:DATA.matches.filter(m=>m.format===fmt))
    .slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  const b=battingAgg(pmatches).find(p=>p.name===name);
  const w=bowlingAgg(pmatches).find(p=>p.name===name);
  const f=fieldingAgg(pmatches).find(p=>p.name===name);

  // month-wise series (selected format)
  const bm={}, wm={};
  pmatches.forEach(m=>{
    const k=(m.date||"").slice(0,7); if(!k)return;
    (m.batting||[]).map(inn).forEach(x=>{ if(x.name===name) bm[k]=(bm[k]||0)+x.runs; });
    (m.bowling||[]).forEach(x=>{ if(x.name===name) wm[k]=(wm[k]||0)+int(x.wickets); });
  });
  const batMonths=Object.keys(bm).sort().map(k=>({label:monthLabel(k),v:bm[k]}));
  const wktMonths=Object.keys(wm).sort().map(k=>({label:monthLabel(k),v:wm[k]}));

  // dismissal breakdown (selected format)
  const dis={};
  pmatches.forEach(m=>(m.batting||[]).forEach(x=>{ if(x.name!==name)return; const d=x.dismissal||"caught"; dis[d]=(dis[d]||0)+1; }));
  const disSegs=Object.keys(dis).map(k=>({label:(DIS_META[k]||{l:k}).l,value:dis[k],color:(DIS_META[k]||{c:"var(--muted-2)"}).c}));

  // per-innings series
  const runsSeries=[]; const wktSeries=[];
  pmatches.forEach(m=>{ const bx=(m.batting||[]).map(inn).find(x=>x.name===name); if(bx)runsSeries.push(bx.runs);
    const wx=(m.bowling||[]).find(x=>x.name===name); if(wx)wktSeries.push(int(wx.wickets)); });

  // match log + vs team (selected format)
  const log=pmatches.map(m=>({m,bat:(m.batting||[]).map(inn).find(x=>x.name===name),bw:(m.bowling||[]).find(x=>x.name===name)})).filter(r=>r.bat||r.bw).reverse();
  const vsMap={};
  pmatches.forEach(m=>{
    (m.batting||[]).map(inn).forEach(x=>{if(x.name!==name)return;const t=vsMap[m.opponent]||(vsMap[m.opponent]={opp:m.opponent,inns:0,runs:0,wkts:0,balls:0});t.inns++;t.runs+=x.runs;t.balls+=x.balls;});
    (m.bowling||[]).forEach(x=>{if(x.name!==name)return;const t=vsMap[m.opponent]||(vsMap[m.opponent]={opp:m.opponent,inns:0,runs:0,wkts:0,balls:0});t.wkts+=int(x.wickets);});
  });
  const vs=Object.values(vsMap);

  // career-by-format tables (all formats)

function viewRecords(v){

    if(!bestBat||b.runs>bestBat.runs)bestBat={...b,opp:m.opponent,date:m.date,id:m.id};
    if(!mostSixes||b.sixes>mostSixes.sixes)mostSixes={...b,opp:m.opponent,id:m.id};
  }));
  let bestBowl=null;
  DATA.matches.forEach(m=>(m.bowling||[]).forEach(b=>{const w=int(b.wickets),r=int(b.runs);if(!bestBowl||w>bestBowl.w||(w===bestBowl.w&&r<bestBowl.r))bestBowl={name:b.name,w,r,opp:m.opponent,id:m.id};}));
  const topRuns=sortRows(battingAgg(),"runs",-1)[0];

  const mostCt=sortRows(fieldingAgg(),"total",-1)[0];
  const bestCap=sortRows(captainAgg().filter(c=>c.played>=2),"winPct",-1)[0];
  const rec=(l,m,s)=>`<div class="card gold stat-card"><div class="k">${l}</div><div class="v" style="font-size:22px">${m}</div><div class="sub">${s}</div></div>`;
  v.innerHTML=`<div class="page-head"><div><div class="eyebrow">Hall of records</div><h2>Records</h2><p>Club bests across all recorded matches</p></div><button class="btn primary" onclick="pdfRecords()">⬇ PDF</button></div>

    ${topWkts?rec("Most career wickets",esc(topWkts.name)+" — "+topWkts.wkts,topWkts.inns+" innings"):""}
    ${bestSR?rec("Best strike rate",esc(bestSR.name)+" — "+bestSR.sr.toFixed(0),"min 30 balls"):""}
    ${bestEcon?rec("Best economy",esc(bestEcon.name)+" — "+bestEcon.econ.toFixed(2),"min 4 overs"):""}
    ${mostCt&&mostCt.total>0?rec("Most dismissals (field)",esc(mostCt.name)+" — "+mostCt.total,mostCt.catches+" ct · "+mostCt.runouts+" ro"):""}
    ${bestCap?rec("Best captain (win%)",esc(bestCap.name)+" — "+bestCap.winPct.toFixed(0)+"%",bestCap.w+"W-"+bestCap.l+"L · min 2 games"):""}
  </div>
  <div class="eyebrow" style="margin-top:26px">Head to head</div>
  <div class="table-wrap table-scroll"><table>
    <thead><tr><th class="l">Opponent</th><th>Played</th><th>Won</th><th>Lost</th><th>Win%</th></tr></thead>
    <tbody>${opponents().map(o=>{const ms=DATA.matches.filter(m=>m.opponent===o);const w=ms.filter(m=>m.result==="won").length;const l=ms.filter(m=>m.result==="lost").length;const dec=w+l+ms.filter(m=>m.result==="tie").length;return `<tr><td class="l pname">${esc(o)}</td><td class="tnum dim">${ms.length}</td><td class="tnum" style="color:var(--pitch)">${w}</td><td class="tnum" style="color:#e37a70">${l}</td><td class="tnum hi">${dec?(w/dec*100).toFixed(0):"—"}%</td></tr>`;}).join("")||emptyRow(5)}</tbody>

function addSquadPlayer(){
  const el=$("#sq-name"); if(!el)return; const name=(el.value||"").trim(); if(!name)return;
  if(!DATA.team) DATA.team={name:TEAM_NAME}; if(!Array.isArray(DATA.team.players)) DATA.team.players=[];
  if(DATA.team.players.some(p=>p.name.toLowerCase()===name.toLowerCase())){alert(name+" is already in the squad.");return;}
  const sub=($("#sq-type")||{}).value==="sub";
  DATA.team.players.push({name,sub}); saveLocal(); setDirty(true); renderNav(); router();
}
function removeSquadPlayer(enc){
  const name=decodeURIComponent(enc);
  if(!confirm("Remove "+name+" from the squad list?\n(Past match stats stay intact.)"))return;
  DATA.team.players=((DATA.team&&DATA.team.players)||[]).filter(p=>p.name!==name); saveLocal(); setDirty(true); renderNav(); router();
}
function toggleSub(enc){
  const name=decodeURIComponent(enc);
  ((DATA.team&&DATA.team.players)||[]).forEach(p=>{if(p.name===name)p.sub=!p.sub;}); saveLocal(); setDirty(true); router();
}

function rowVal(id,k){const el=document.querySelector("#"+id+" [data-k='"+k+"']");return el?el.value:"";}
function recalcBat(id){
  const o=int(rowVal(id,"ones")),t=int(rowVal(id,"twos")),th=int(rowVal(id,"threes")),f=int(rowVal(id,"fours")),s=int(rowVal(id,"sixes")),d=int(rowVal(id,"dots"));
  const runs=o+2*t+3*th+4*f+6*s,balls=d+o+t+th+f+s,sr=balls?(runs/balls*100).toFixed(0):"0";
  const c=$("#calc-"+id); if(c)c.textContent=runs+" ("+balls+") "+(balls?"·SR"+sr:"");
  recalcBatTotal();
}
function recalcBatTotal(){
  let tot=0;document.querySelectorAll("#bat-rows tr").forEach(tr=>{const g=k=>int((tr.querySelector("[data-k='"+k+"']")||{}).value);tot+=g("ones")+2*g("twos")+3*g("threes")+4*g("fours")+6*g("sixes");});
  const el=$("#bat-total"); if(el)el.textContent=tot;
  recalcSummary();
}
function recalcBowl(id){const balls=oversToBalls(rowVal(id,"overs")),runs=int(rowVal(id,"runs"));const c=$("#calc-"+id);if(c)c.textContent=balls?(runs/(balls/6)).toFixed(1):"—";recalcSummary();}
function setVal(id,v){const el=$("#"+id); if(el)el.value=v;}
function recalcSummary(){
  let runs=0,balls=0,wkts=0;
  document.querySelectorAll("#bat-rows tr").forEach(tr=>{ const g=k=>int((tr.querySelector("[data-k='"+k+"']")||{}).value);
    const nm=((tr.querySelector("[data-k='name']")||{}).value||"").trim();
    const o=g("ones"),t=g("twos"),th=g("threes"),f=g("fours"),s=g("sixes"),d=g("dots");
    runs+=o+2*t+3*th+4*f+6*s; balls+=d+o+t+th+f+s;
    const dis=(tr.querySelector("[data-k='dismissal']")||{}).value;
    if(nm && dis && dis!=="notout") wkts++;
  });
  const extras=int(($("#f-extras")||{}).value);
  const ourTotal=runs+extras;
  setVal("f-ourtotal",ourTotal); setVal("f-ourwkts",wkts); setVal("f-ourovers",ballsToOvers(balls));
  let oppRuns=0,oppWkts=0,oppBalls=0;
  document.querySelectorAll("#bowl-rows tr").forEach(tr=>{ const g=k=>int((tr.querySelector("[data-k='"+k+"']")||{}).value);
    oppRuns+=g("runs"); oppWkts+=g("wickets"); oppBalls+=oversToBalls((tr.querySelector("[data-k='overs']")||{}).value);
  });
  let runouts=0; document.querySelectorAll("#field-rows tr").forEach(tr=>{ runouts+=int((tr.querySelector("[data-k='runouts']")||{}).value); });
  oppWkts+=runouts;
  setVal("f-opptotal",oppRuns); setVal("f-oppwkts",oppWkts); setVal("f-oppovers",ballsToOvers(oppBalls));
  const rsel=$("#f-result");
  if(rsel){ if(ourTotal>oppRuns) rsel.value="won"; else if(ourTotal<oppRuns) rsel.value="lost"; else if(ourTotal===oppRuns && (ourTotal>0||oppRuns>0)) rsel.value="tie"; }
}
function onDecisionOrder(){

}
function saveMatch(){

    const dis=gk("dismissal"),who=gk("who").trim();

    if(who){if(dis==="caught"||dis==="stumped"||dis==="runout")rec.fielder=who;else rec.bowler=who;}
    bat.push(rec);
  });
  const bowl=[];document.querySelectorAll("#bowl-rows tr").forEach(tr=>{

    const name=gk("name").trim();if(!name)return;
    bowl.push({name,overs:gk("overs").trim()||"0",runs:int(gk("runs")),wickets:int(gk("wickets")),dots:int(gk("dots")),wides:int(gk("wides")),noballs:int(gk("noballs"))});
  });
  const field=[];document.querySelectorAll("#field-rows tr").forEach(tr=>{
    const gk=k=>(tr.querySelector("[data-k='"+k+"']")||{}).value||"";
    const name=gk("name").trim();if(!name)return;
    const c=int(gk("catches")),r=int(gk("runouts")),s=int(gk("stumpings"));if(c+r+s===0)return;
    field.push({name,catches:c,runouts:r,stumpings:s});
  });
  if(!g("f-opp").trim()){alert("Please enter the opponent name.");return;}
  if(bat.length===0){alert("Add at least one batsman.");return;}
  const match={id:"m"+Date.now(),date:g("f-date")||new Date().toISOString().slice(0,10),
    opponent:g("f-opp").trim(),captain:g("f-captain").trim(),ground:g("f-ground").trim(),venueType:g("f-venuetype"),format:g("f-format").trim(),
    toss:g("f-toss"),decision:g("f-decision"),
    ourTotal:int(g("f-ourtotal")),ourWickets:int(g("f-ourwkts")),ourOvers:g("f-ourovers").trim(),
    oppTotal:int(g("f-opptotal")),oppWickets:int(g("f-oppwkts")),oppOvers:g("f-oppovers").trim(),
    result:g("f-result"),motm:g("f-motm").trim(),batting:bat,bowling:bowl,fielding:field};
  if(EDIT_ID){ const i=DATA.matches.findIndex(m=>m.id===EDIT_ID); match.id=EDIT_ID; if(i>=0)DATA.matches[i]=match; else DATA.matches.push(match); EDIT_ID=null; }
  else { DATA.matches.push(match); }
  if(Array.isArray(DATA.fixtures)) DATA.fixtures=DATA.fixtures.filter(fx=>!(fx.date===match.date&&fx.opponent===match.opponent));
  saveLocal();setDirty(true);renderNav();
  const el=$("#save-msg");if(el)el.textContent="✓ Saved. Go to Data & publish to export.";
  setTimeout(()=>{location.hash="#/match/"+match.id;},700);
}

function utf8ToB64(str){ return btoa(unescape(encodeURIComponent(str))); }
async function publishToGitHub(){
  const g=getGH();
  const setMsg=t=>{const e=$("#gh-msg"); if(e)e.textContent=t;};
  if(!g.owner||!g.repo||!g.token){ alert("First set up one-click publish (owner, repo and token) in Data & publish."); location.hash="#/data"; return; }
  const path=g.path||"data.json", branch=g.branch||"main";
  const url="https://api.github.com/repos/"+g.owner+"/"+g.repo+"/contents/"+path.split("/").map(encodeURIComponent).join("/");
  const headers={Authorization:"Bearer "+g.token,Accept:"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"};
  try{
    setMsg("Publishing…");
    let sha;
    const getRes=await fetch(url+"?ref="+encodeURIComponent(branch),{headers});
    if(getRes.status===200){ const j=await getRes.json(); sha=j.sha; }
    else if(getRes.status===401||getRes.status===403){ throw new Error("Token rejected — check it has Contents: Read & write for this repo."); }
    else if(getRes.status!==404){ throw new Error("Could not read repo ("+getRes.status+") — check owner/repo/branch."); }
    const body={message:"Update data.json ("+new Date().toISOString().slice(0,10)+") via Stats Hub",content:utf8ToB64(JSON.stringify(DATA,null,2)),branch};
    if(sha)body.sha=sha;
    const putRes=await fetch(url,{method:"PUT",headers,body:JSON.stringify(body)});
    if(!putRes.ok){ let e={}; try{e=await putRes.json();}catch(_){}
      throw new Error(e.message||("Publish failed ("+putRes.status+")")); }
    setDirty(false); setMsg("✓ Published to GitHub. Public site updates within ~1 minute.");
    alert("Published to GitHub successfully!\nYour public site will update in about a minute.");
  }catch(err){
    setMsg("✗ "+err.message);
    alert("Could not publish: "+err.message+"\n\nYou can still use Download data.json as a manual backup.");
  }
}

/* ============================================================ LIVE SCORING ============================================================
   Ball-by-ball, offline, auto-saved to this browser after every tap.
   We only score OUR team: our batting (per-batter shots) and our bowling
   (per-bowler figures). Finish -> converts to a normal match for review/save. */
const LS_LIVE="goldhayat_live";
const FMT_OVERS={"T20":20,"T10":10,"OD":8,"Test Match":""};
window.onLiveFormat=()=>{ const f=(($("#lv-format")||{}).value); const o=$("#lv-overs"); if(o){ const d=FMT_OVERS[f]; o.value=(d===""||d==null)?"":d; } };
function liveSave(){ try{ localStorage.setItem(LS_LIVE, JSON.stringify(LIVE)); }catch(e){} }
function liveSnap(){ const c=JSON.parse(JSON.stringify(LIVE)); delete c._undo; (LIVE._undo=LIVE._undo||[]).push(c); if(LIVE._undo.length>150)LIVE._undo.shift(); }
function liveCommit(){ liveSave(); router(); }
window.liveUndo=()=>{ if(LIVE&&LIVE._undo&&LIVE._undo.length){ const u=LIVE._undo; const prev=u.pop(); prev._undo=u; LIVE=prev; liveCommit(); } };
function oversStr(balls){ return Math.floor(balls/6)+"."+(balls%6); }
function liveActive(){ return !!(LIVE&&LIVE.active); }

function emptyBat(){ return {striker:"",nonStriker:"",order:[],players:{},extras:{wides:0,noballs:0},legalBalls:0,total:0,wickets:0,recent:[],needNew:false,pendingWicket:false,done:false}; }
function emptyBowl(){ return {currentBowler:"",bowlers:{},oppTotal:0,oppWkts:0,legalBalls:0,recent:[],needNew:true,pendingWicket:false,done:false}; }

window.liveStart=()=>{
  const g=id=>(($("#"+id)||{}).value||"");

  LIVE={ active:true,
    meta:{ date:g("lv-date")||new Date().toISOString().slice(0,10), opponent:opp, ground:g("lv-venue").trim(),
      venueType:g("lv-type"), format:g("lv-format"), captain:g("lv-captain").trim(), toss:g("lv-toss"), decision:g("lv-decision"),
      oversLimit:int(g("lv-overs")) },
    phase:(g("lv-decision")==="bat"?"batting":"bowling"),
    xi:[], xiDraft:rosterNames().slice(), pool:rosterNames().slice(),

window.liveDiscard=()=>{ if(confirm("Discard this live match? Entered balls will be lost.")){ try{localStorage.removeItem(LS_LIVE);}catch(e){} LIVE=null; location.hash="#/live"; router(); } };

function ensureBat(b,name){ if(!b.players[name]){ b.players[name]={dots:0,ones:0,twos:0,threes:0,fours:0,sixes:0,balls:0,out:false,dismissal:"notout"}; b.order.push(name); } }
function ensureBowl(w,name){ if(!w.bowlers[name]){ w.bowlers[name]={balls:0,runs:0,wickets:0,dots:0,wides:0,noballs:0}; } }
function swapStrike(b){ const t=b.striker; b.striker=b.nonStriker; b.nonStriker=t; }
function pushRecent(arr,sym){ arr.push(sym); if(arr.length>8)arr.shift(); }

window.liveSetOpeners=()=>{ const b=LIVE.bat; const s=($("#lv-striker")||{}).value, n=($("#lv-nonstriker")||{}).value;
  if(!s||!n||s===n){ alert("Pick two different opening batsmen."); return; }
  liveSnap(); ensureBat(b,s); ensureBat(b,n); b.striker=s; b.nonStriker=n; liveCommit(); };
window.liveNewBatsman=()=>{ const b=LIVE.bat; const nm=($("#lv-newbat")||{}).value; if(!nm){alert("Pick the next batsman.");return;}
  liveSnap(); ensureBat(b,nm); b.striker=nm; b.needNew=false; if(b._swap){ swapStrike(b); b._swap=false; } liveCommit(); };
window.liveSetBowler=()=>{ const w=LIVE.bowl; const nm=($("#lv-bowler")||{}).value; if(!nm){alert("Pick the bowler.");return;}
  liveSnap(); ensureBowl(w,nm); w.currentBowler=nm; w.needNew=false; liveCommit(); };
window.liveSwapStrike=()=>{ if(!LIVE||LIVE.phase!=="batting")return; const b=LIVE.bat; if(!b.striker||!b.nonStriker||b.needNew||b.pendingWicket)return; liveSnap(); swapStrike(b); liveCommit(); };
function liveSquad(){ return (LIVE&&LIVE.xi&&LIVE.xi.length)?LIVE.xi:((LIVE&&LIVE.pool)||allPlayers()); }
window.liveToggleXI=(enc)=>{ const nm=decodeURIComponent(enc); const d=LIVE.xiDraft||(LIVE.xiDraft=[]); const i=d.indexOf(nm); if(i<0)d.push(nm); else d.splice(i,1); liveCommit(); };

window.onLiveRun=(r)=>{
  if(LIVE.phase==="batting"){ const b=LIVE.bat; if(b.needNew||b.pendingWicket||!b.striker||!b.nonStriker)return;
    liveSnap(); const s=b.players[b.striker]; s.balls++; b.total+=r; b.legalBalls++;
    if(r===0)s.dots++; else if(r===1)s.ones++; else if(r===2)s.twos++; else if(r===3)s.threes++; else if(r===4)s.fours++; else if(r===6)s.sixes++;
    pushRecent(b.recent, r===0?"•":String(r));
    if(r%2===1) swapStrike(b);
    if(b.legalBalls%6===0) swapStrike(b);
    liveCommit();
  } else { const w=LIVE.bowl; if(w.needNew||w.pendingWicket||!w.currentBowler)return;
    liveSnap(); const bw=w.bowlers[w.currentBowler]; bw.balls++; bw.runs+=r; w.oppTotal+=r; w.legalBalls++;
    if(r===0)bw.dots++; pushRecent(w.recent, r===0?"•":String(r));
    if(w.legalBalls%6===0){ w.needNew=true; }
    liveCommit();
  }
};
window.onLiveExtra=(kind)=>{ // wide/noball: +1, not a legal ball
  if(LIVE.phase==="batting"){ const b=LIVE.bat; if(b.needNew||b.pendingWicket||!b.striker)return; liveSnap();
    b.total+=1; if(kind==="wd")b.extras.wides++; else b.extras.noballs++; pushRecent(b.recent, kind==="wd"?"Wd":"Nb"); liveCommit();
  } else { const w=LIVE.bowl; if(w.needNew||w.pendingWicket||!w.currentBowler)return; liveSnap();
    const bw=w.bowlers[w.currentBowler]; bw.runs+=1; w.oppTotal+=1; if(kind==="wd")bw.wides++; else bw.noballs++; pushRecent(w.recent, kind==="wd"?"Wd":"Nb"); liveCommit();
  }
};
window.onLiveWicketStart=()=>{ if(LIVE.phase==="batting"){ if(LIVE.bat.needNew)return; LIVE.bat.pendingWicket=true; } else { if(LIVE.bowl.needNew)return; LIVE.bowl.pendingWicket=true; } liveCommit(); };
window.onLiveWicketCancel=()=>{ LIVE.bat.pendingWicket=false; LIVE.bowl.pendingWicket=false; liveCommit(); };
window.onLiveWicket=(type)=>{
  if(LIVE.phase==="batting"){ const b=LIVE.bat; liveSnap(); const s=b.players[b.striker];
    s.balls++; s.out=true; s.dismissal=type; b.legalBalls++; b.wickets++; pushRecent(b.recent,"W"); b.pendingWicket=false;
    const overEnd=(b.legalBalls%6===0);
    if(b.wickets>=10){ b.done=true; } else { b.needNew=true; b._swap=overEnd; }
    liveCommit();
  } else { const w=LIVE.bowl; const fielder=($("#lv-fielder")||{}).value||""; liveSnap();
    const bw=w.bowlers[w.currentBowler]; bw.balls++; bw.wickets++; bw.dots++; w.oppTotal+=0; w.legalBalls++; w.oppWkts++; pushRecent(w.recent,"W"); w.pendingWicket=false;
    if(fielder && (type==="caught"||type==="runout"||type==="stumped")){ const f=LIVE.field[fielder]||(LIVE.field[fielder]={catches:0,runouts:0,stumpings:0});
      if(type==="caught")f.catches++; else if(type==="runout")f.runouts++; else f.stumpings++; }
    if(w.legalBalls%6===0){ w.needNew=true; }
    liveCommit();
  }
};
window.liveEndInnings=()=>{
  if(LIVE.phase==="batting"){ LIVE.bat.done=true; LIVE.phase="bowling"; }
  else { LIVE.bowl.done=true; LIVE.phase="batting"; if(!LIVE.bat.order.length){/* stay to score batting */} }
  liveCommit();
};
function liveToMatch(){
  const b=LIVE.bat, w=LIVE.bowl;
  const batting=b.order.map((nm,i)=>{ const p=b.players[nm]; return {name:nm,dots:p.dots,ones:p.ones,twos:p.twos,threes:p.threes,fours:p.fours,sixes:p.sixes,dismissal:p.out?p.dismissal:"notout",position:i+1}; });
  const bowling=Object.keys(w.bowlers).map(nm=>{ const p=w.bowlers[nm]; return {name:nm,overs:oversStr(p.balls),runs:p.runs,wickets:p.wickets,dots:p.dots,wides:p.wides,noballs:p.noballs}; });
  const fielding=Object.keys(LIVE.field||{}).map(nm=>({name:nm,catches:LIVE.field[nm].catches,runouts:LIVE.field[nm].runouts,stumpings:LIVE.field[nm].stumpings}));
  const m=LIVE.meta;
  return { date:m.date,opponent:m.opponent,ground:m.ground,venueType:m.venueType,format:m.format,captain:m.captain,toss:m.toss,decision:m.decision,
    ourTotal:b.total,ourWickets:b.wickets,ourOvers:oversStr(b.legalBalls),
    oppTotal:w.oppTotal,oppWickets:w.oppWkts,oppOvers:oversStr(w.legalBalls),
    result:"",motm:"",batting,bowling,fielding };
}
window.liveFinish=()=>{

  if(!match.batting.length && !match.bowling.length){ alert("Score at least a few balls first."); return; }

};

function liveSetupForm(){
  const today=new Date().toISOString().slice(0,10);
  return `<div class="page-head"><div><div class="eyebrow">Live scoring</div><h2>Start a live match</h2><p>Score ball-by-ball during the game. It auto-saves in this browser after every tap; when you finish, it fills a full scorecard for review.</p></div></div>
  <div class="form-section"><h3>Match setup</h3><div class="form-grid">
    <div class="field"><label>Date</label><input type="date" id="lv-date" value="${today}"></div>
    <div class="field"><label>Opponent</label><input id="lv-opp" list="opp-list-lv" placeholder="Team"><datalist id="opp-list-lv">${opponents().map(o=>`<option value="${esc(o)}">`).join("")}</datalist></div>
    <div class="field"><label>Venue</label><input id="lv-venue" list="venue-list-lv" placeholder="Ground"><datalist id="venue-list-lv">${venues().map(g=>`<option value="${esc(g)}">`).join("")}</datalist></div>
    <div class="field"><label>Match at</label><select id="lv-type"><option value="">—</option><option value="home">Our venue (Home)</option><option value="away">Their venue (Away)</option><option value="neutral">Neutral</option></select></div>
    <div class="field"><label>Format</label><select id="lv-format" onchange="onLiveFormat()">${FORMATS.map(f=>`<option value="${esc(f)}">${esc(f)}</option>`).join("")}</select></div>
    <div class="field"><label>Overs per side</label><input type="number" id="lv-overs" list="lv-overs-list" value="${FMT_OVERS[FORMATS[0]]||""}" placeholder="e.g. 8"><datalist id="lv-overs-list"><option value="8"><option value="10"><option value="15"><option value="20"><option value="25"><option value="40"><option value="50"></datalist></div>
    <div class="field"><label>Captain (ours)</label><input id="lv-captain" list="cap-list-lv" placeholder="Captain"><datalist id="cap-list-lv">${captains().map(o=>`<option value="${esc(o)}">`).join("")}</datalist></div>
    <div class="field"><label>Toss</label><select id="lv-toss"><option>won</option><option>lost</option></select></div>
    <div class="field"><label>We are…</label><select id="lv-decision"><option value="bat">Batting first</option><option value="bowl">Bowling first</option></select></div>
  </div>
  <button class="btn primary" style="margin-top:14px" onclick="liveStart()">▶ Start live match</button></div>`;
}
function pad(){
  return `<div class="lv-keypad">
    <div class="lv-keys-runs">
      <button class="lv-key" onclick="onLiveRun(0)"><span class="k-n">0</span><span class="k-l">dot</span></button>
      <button class="lv-key" onclick="onLiveRun(1)"><span class="k-n">1</span><span class="k-l">single</span></button>
      <button class="lv-key" onclick="onLiveRun(2)"><span class="k-n">2</span><span class="k-l">two</span></button>
      <button class="lv-key" onclick="onLiveRun(3)"><span class="k-n">3</span><span class="k-l">three</span></button>
      <button class="lv-key four" onclick="onLiveRun(4)"><span class="k-n">4</span><span class="k-l">four</span></button>
      <button class="lv-key six" onclick="onLiveRun(6)"><span class="k-n">6</span><span class="k-l">six</span></button>
    </div>
    <div class="lv-keys-act">
      <button class="lv-key act ext" onclick="onLiveExtra('wd')">Wide +1</button>
      <button class="lv-key act ext" onclick="onLiveExtra('nb')">No ball +1</button>
      <button class="lv-key act wkt" onclick="onLiveWicketStart()">Wicket</button>
      <button class="lv-key act undo" onclick="liveUndo()">↶ Undo</button>
    </div>
  </div>`;
}
function recentChips(arr){
  const bead=x=>{let c="";if(x==="4")c="b4";else if(x==="6")c="b6";else if(x==="W")c="bw";else if(x==="Wd"||x==="Nb")c="bx";return `<span class="lv-bead ${c}">${esc(x)}</span>`;};
  return `<div class="lv-timeline"><span class="lbl">Recent</span>${(arr&&arr.length)?arr.map(bead).join(""):'<span class="dim">—</span>'}</div>`;
}
function batSelect(id,exclude){ const opts=liveSquad().filter(n=>!exclude.includes(n)); return `<select id="${id}"><option value="">Select…</option>${opts.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join("")}</select>`; }
function viewLive(v){
  if(!liveActive()){ v.innerHTML=liveSetupForm(); return; }
  const m=LIVE.meta;
  const R=p=>p.ones+2*p.twos+3*p.threes+4*p.fours+6*p.sixes;
  const toolbar=`<div class="lv-toolbar">
    <div class="lv-tag"><span class="lv-live-dot"></span>LIVE <span class="dim">· vs ${esc(m.opponent)}${m.ground?" · "+esc(m.ground):""}</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ghost sm" onclick="liveAddSubPrompt()">＋ Sub</button>
      <button class="btn ghost sm" onclick="liveEndInnings()">End innings ⇄</button>
      <button class="btn primary sm" onclick="liveFinish()">✓ Finish &amp; review</button>
      <button class="btn danger sm" onclick="liveDiscard()">Discard</button>
    </div></div>`;

  if(!(LIVE.xi&&LIVE.xi.length)){
    v.innerHTML=`<div class="lv-toolbar"><div class="lv-tag"><span class="lv-live-dot"></span>SETUP <span class="dim">· vs ${esc(m.opponent)}${m.format?" · "+esc(m.format):""}</span></div><button class="btn danger sm" onclick="liveDiscard()">Discard</button></div>`+xiPickerHTML();
    return;
  }

  if(LIVE.phase==="batting"){
    const b=LIVE.bat;
    if(!b.striker||!b.nonStriker){
      v.innerHTML=toolbar+`<div class="lv-panel"><h4>Opening batsmen</h4>
        <div class="form-grid"><div class="field"><label>Striker</label>${batSelect("lv-striker",[])}</div>
        <div class="field"><label>Non-striker</label>${batSelect("lv-nonstriker",[])}</div></div>
        <button class="btn primary" style="margin-top:12px" onclick="liveSetOpeners()">Start batting</button></div>`;
      return;
    }
    const s=b.players[b.striker], ns=b.players[b.nonStriker];
    const sR=R(s), nsR=R(ns);
    const sSR=s.balls?(sR/s.balls*100).toFixed(0):"0", nsSR=ns.balls?(nsR/ns.balls*100).toFixed(0):"0";
    const rr=b.legalBalls?(b.total/(b.legalBalls/6)).toFixed(2):"0.00";
    const ballsLeft=m.oversLimit?Math.max(0,m.oversLimit*6-b.legalBalls):null;
    const board=`<div class="lv-board">
      <div class="lv-board-top"><div class="lv-team">Gold Hayat — batting</div><div class="lv-badge">${esc(m.format||"")} · ${oversStr(b.legalBalls)}${m.oversLimit?" / "+m.oversLimit:""} ov</div></div>
      <div class="lv-score">${b.total}<span class="w">/${b.wickets}</span><span class="ov">(${oversStr(b.legalBalls)})</span></div>
      <div class="lv-meta"><span class="chipm">CRR <b>${rr}</b></span>${ballsLeft!=null?`<span class="chipm">${ballsLeft} balls left</span>`:""}<span class="chipm">vs ${esc(m.opponent)}</span></div>
      <div class="lv-strike">
        <div class="lv-batcard on"><div class="nm">▶ on strike · ${esc(b.striker)}</div><div class="rn">${sR}<small> (${s.balls})</small></div><div class="sr">SR ${sSR} · ${s.fours}×4 ${s.sixes}×6</div></div>
        <div class="lv-batcard"><div class="nm">${esc(b.nonStriker)}</div><div class="rn">${nsR}<small> (${ns.balls})</small></div><div class="sr">SR ${nsSR}</div></div>
      </div>
      <div style="text-align:right;margin-top:10px"><button class="btn ghost sm" onclick="liveSwapStrike()">⇄ Swap strike</button></div>
      ${recentChips(b.recent)}
    </div>`;
    let panel="";
    if(b.needNew){ panel=`<div class="lv-panel"><h4>Wicket! Next batsman in</h4>${batSelect("lv-newbat",b.order)}
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary" onclick="liveNewBatsman()">Send in</button><button class="btn ghost" onclick="liveAddSubPrompt()">＋ Add player</button></div></div>`; }
    else if(b.pendingWicket){ panel=`<div class="lv-panel"><h4>How was ${esc(b.striker)} out?</h4>
      <div class="lv-types">${["bowled","caught","lbw","runout","stumped","hitwicket"].map(t=>`<button class="t" onclick="onLiveWicket('${t}')">${t==="runout"?"run out":t==="hitwicket"?"hit wicket":t}</button>`).join("")}</div>
      <button class="btn ghost sm" style="margin-top:12px" onclick="onLiveWicketCancel()">Cancel</button></div>`; }
    v.innerHTML=toolbar+board+((b.needNew||b.pendingWicket)?panel:pad());
    return;
  }

  const w=LIVE.bowl;
  if(w.needNew||!w.currentBowler){
    v.innerHTML=toolbar+`<div class="lv-board">
      <div class="lv-board-top"><div class="lv-team">${esc(m.opponent)} — batting</div><div class="lv-badge">${esc(m.format||"")} · ${oversStr(w.legalBalls)}${m.oversLimit?" / "+m.oversLimit:""} ov</div></div>
      <div class="lv-score">${w.oppTotal}<span class="w">/${w.oppWkts}</span><span class="ov">(${oversStr(w.legalBalls)})</span></div>
      <div class="lv-meta"><span class="chipm">Our bowling</span></div>${recentChips(w.recent)}</div>
      <div class="lv-panel"><h4>${w.legalBalls?"Next over — choose bowler":"Opening bowler"}</h4>${batSelect("lv-bowler",[])}
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary" onclick="liveSetBowler()">Start over</button><button class="btn ghost" onclick="liveAddSubPrompt()">＋ Add player</button></div></div>`;
    return;
  }
  const bw=w.bowlers[w.currentBowler];
  const econ=bw.balls?(bw.runs/(bw.balls/6)).toFixed(2):"0.00";
  const rr=w.legalBalls?(w.oppTotal/(w.legalBalls/6)).toFixed(2):"0.00";
  const board=`<div class="lv-board">
    <div class="lv-board-top"><div class="lv-team">${esc(m.opponent)} — batting</div><div class="lv-badge">${esc(m.format||"")} · ${oversStr(w.legalBalls)}${m.oversLimit?" / "+m.oversLimit:""} ov</div></div>
    <div class="lv-score">${w.oppTotal}<span class="w">/${w.oppWkts}</span><span class="ov">(${oversStr(w.legalBalls)})</span></div>
    <div class="lv-meta"><span class="chipm">Our bowling</span><span class="chipm">RR <b>${rr}</b></span></div>
    <div class="lv-strike">
      <div class="lv-batcard on"><div class="nm">● bowling · ${esc(w.currentBowler)}</div><div class="rn">${bw.wickets}<small>/${bw.runs}</small></div><div class="sr">${oversStr(bw.balls)} ov · econ ${econ}</div></div>
      <div class="lv-batcard"><div class="nm">This spell</div><div class="rn">${bw.dots}<small> dots</small></div><div class="sr">${bw.wides} wd · ${bw.noballs} nb</div></div>
    </div>
    ${recentChips(w.recent)}
  </div>`;
  let panel="";
  if(w.pendingWicket){ panel=`<div class="lv-panel"><h4>Wicket! Credit our fielder (for catch / run-out / stumping)</h4>
    <div class="field" style="margin-bottom:10px"><label>Fielder</label>${batSelect("lv-fielder",[])}</div>
    <div class="lv-types">${["bowled","caught","lbw","runout","stumped"].map(t=>`<button class="t" onclick="onLiveWicket('${t}')">${t==="runout"?"run out":t}</button>`).join("")}</div>
    <button class="btn ghost sm" style="margin-top:12px" onclick="onLiveWicketCancel()">Cancel</button></div>`; }
  v.innerHTML=toolbar+board+(w.pendingWicket?panel:pad());
}

</script>
</body>
</html>
